repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.13.0
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --fix, --config=pyproject.toml ]
    # Run the formatter.
    - id: ruff-format
      args: [ --config=pyproject.toml ]

- repo: local
  hooks:
    - id: regen-docs-reference
      name: Regenerate docs/reference.md
      language: system
      entry: uv run python scripts/generate_docs_reference.py
      pass_filenames: false
      # Regenerate when any config class or the generator itself changes.
      files: ^(packages/prime-rl-configs/src/prime_rl/configs/.*\.py|scripts/generate_docs_reference\.py)$
