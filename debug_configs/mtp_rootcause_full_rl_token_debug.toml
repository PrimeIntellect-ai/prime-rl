[wandb]
project = "mtp-qwen35-hendrycks"
entity = "primeintellect"
name = "qwen35-2b-mtp-non-thinking-8xh200-rootcause-token-debug"
group = "qwen35-mtp-rootcause-isolation"

[deployment]
num_train_gpus = 4
num_infer_gpus = 4

[model]
name = "Qwen/Qwen3.5-2B"

[orchestrator]
batch_size = 128
max_inflight_rollouts = 128
rollouts_per_example = 8
max_off_policy_steps = 8
strict_async_level = false
