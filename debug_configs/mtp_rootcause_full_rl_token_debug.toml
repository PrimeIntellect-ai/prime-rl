    { type = "repetition", enforce = false, window = 3000, prob_threshold = 0.99 },
    { type = "zero_advantage", enforce = false },
]

[orchestrator.train.sampling]
temperature = 1.0
repetition_penalty = 1.0
min_tokens = 0
extra_body = { enable_thinking = false }

[[orchestrator.train.env]]
