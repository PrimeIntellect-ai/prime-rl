
max_steps = 500
seq_len = 2048

[deployment]
num_infer_gpus = 4
num_train_gpus = 4
gpus_per_node = 8

[model]
name = "JJJYmmm/ZAYA1-8B-HF"

[wandb]
project = "prime-takehome"

[orchestrator]
batch_size = 512
rollouts_per_example = 16

[orchestrator.train.sampling]
max_completion_tokens = 2048

[[orchestrator.train.env]]
id = "math-env"
name = "hendrycks-math"
args = { dataset_name = "PrimeIntellect/Hendrycks-Math", dataset_subset = "default", math_verify_max_workers = 128, math_verify_timeout = 60 }

[orchestrator.buffer]
easy_threshold = 1.0
hard_threshold = 0.0

[orchestrator.eval]
interval = 10

[orchestrator.train.sampling.extra_body.chat_template_kwargs]
enable_thinking = false

[orchestrator.eval.sampling]
max_completion_tokens = 2048

[[orchestrator.eval.env]]
id = "math500"
num_examples = 30
rollouts_per_example = 4

[trainer]

[trainer.model]
impl = "custom"
attn = "flash_attention_2"
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[inference]

[inference.model]
name = "Zyphra/ZAYA1-8B"
