[project]
name = "prime-rl-kernels"
version = "0.1.0"
description = "Standalone GPU kernels for prime-rl"
readme = "README.md"
requires-python = "~=3.12.0"
dependencies = [
    "torch>=2.11.0",
    "triton>=3.6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prime_rl_kernels"]
