[project]
name = "prime-rl-configs"
version = "0.4.0"
description = "Slim config schema for prime-rl (no GPU/ML deps)."
readme = "README.md"
requires-python = "~=3.12.0"
dependencies = [
    "pydantic>=1.10.13",
    "prime-pydantic-config>=0.3.0.dev82",
    # OrchestratorConfig.renderer and SFTConfig.renderer use renderers'
    # typed RendererConfig discriminated union directly. Renderers is
    # light; its only weighty transitive (transformers) is lazy-imported
    # via the validator, so plain ``from prime_rl.configs.orchestrator import
    # OrchestratorConfig`` still doesn't pull it into sys.modules.
    "renderers @ git+https://github.com/PrimeIntellect-ai/renderers@renderers-v0.1.8.dev27",
    "tomli>=2.2.1",
    "tomli-w>=1.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prime_rl"]

[tool.hatch.metadata]
allow-direct-references = true
