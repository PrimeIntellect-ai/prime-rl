# Example DynamoGraphDeployment for serving inference to prime-rl.
#   kubectl apply -f dynamo-dgd.yaml -n <your-namespace>
#
# Replace `<your-namespace>`, `<your-registry>/dynamo:<vllm-runtime-tag>`,
# `<your-image-pull-secret>`, and the model name below for your environment.
# Requires DYN_ENABLE_RL=true on the Dynamo runtime so /v1/rl/* endpoints are
# served natively.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: prime-rl-dynamo
  namespace: <your-namespace>
spec:
  backendFramework: vllm
  pvcs:
    - create: false
      name: model-cache
  services:
    Frontend:
      componentType: frontend

      extraPodSpec:
        imagePullSecrets:
          - name: <your-image-pull-secret>
        mainContainer:
          image: <your-registry>/dynamo:<vllm-runtime-tag>
          startupProbe:
            failureThreshold: 360
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
      replicas: 1
      volumeMounts:
        - mountPoint: /model-cache
          name: model-cache
    VllmWorker:
      componentType: worker

      envFromSecret: hf-token-secret
      extraPodSpec:
        imagePullSecrets:
          - name: <your-image-pull-secret>
        mainContainer:
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - Qwen/Qwen3-4B-Instruct-2507
            - --served-model-name
            - Qwen/Qwen3-4B-Instruct-2507
            - --tensor-parallel-size
            - "1"
            - --max-model-len
            - "2048"
            - --max-num-seqs
            - "64"
            - --gpu-memory-utilization
            - "0.90"
            - --enforce-eager
          env:
            - name: HF_HOME
              value: /model-cache/huggingface
          image: <your-registry>/dynamo:<vllm-runtime-tag>
          startupProbe:
            failureThreshold: 360
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 10
          workingDir: /workspace/examples/backends/vllm
        tolerations:
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
      replicas: 1
      resources:
        limits:
          gpu: "1"
        requests:
          gpu: "1"
      sharedMemory:
        size: 16Gi
      volumeMounts:
        - mountPoint: /model-cache
          name: model-cache
