{{- $dgdWorkload := dict }}
{{- if eq .Values.inference.mode "dynamoGraph" }}
{{- $workloadBinding := required "inference.dynamoGraph.workloadBinding is required" .Values.inference.dynamoGraph.workloadBinding }}
{{- $workloadCanonical := required "inference.dynamoGraph.workloadBinding.canonical is required" $workloadBinding.canonical }}
{{- $dgdWorkload = mustFromJson $workloadCanonical }}
{{- end }}
{{- if .Values.orchestrator.enabled }}
{{- $orchestratorPlacement := .Values.orchestrator }}
{{- if eq .Values.inference.mode "dynamoGraph" }}
{{- $orchestratorWorkload := required "canonical orchestrator workload is required" (index $dgdWorkload "orchestrator") }}
{{- $orchestratorPlacement = required "canonical orchestrator placement is required" (index $orchestratorWorkload "placement") }}
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-orchestrator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "prime-rl.labels" . | nindent 4 }}
    {{- include "prime-rl.componentLabels" . | nindent 4 }}
    role: orchestrator
spec:
  serviceName: {{ .Release.Name }}-orchestrator-headless
  replicas: {{ .Values.orchestrator.replicas }}
  selector:
    matchLabels:
      {{- include "prime-rl.componentLabels" . | nindent 6 }}
      role: orchestrator
  template:
    metadata:
      labels:
        {{- include "prime-rl.selectorLabels" . | nindent 8 }}
        {{- include "prime-rl.componentLabels" . | nindent 8 }}
        role: orchestrator
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- with $orchestratorPlacement.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $orchestratorPlacement.runtimeClassName }}
      runtimeClassName: {{ $orchestratorPlacement.runtimeClassName }}
      {{- end }}
      {{- with $orchestratorPlacement.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: prime-rl-orchestrator
        image: {{ include "prime-rl.image" . | quote }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- if .Values.orchestrator.autoStart }}
        command: ["/bin/bash", "-c"]
        args:
          - {{ .Values.orchestrator.command }}
        {{- else }}
        command: ["sleep", "infinity"]
        {{- end }}
        ports:
        - containerPort: {{ .Values.orchestrator.service.port }}
          name: api
        - containerPort: {{ .Values.orchestrator.service.ncclPort }}
          name: nccl
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: ROLE
          value: "orchestrator"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: STATEFUL_REPLICAS
          value: "{{ .Values.orchestrator.replicas }}"
        - name: HEADLESS_SERVICE
          value: "{{ .Release.Name }}-orchestrator-headless.{{ .Values.namespace }}.svc.cluster.local"
        - name: INFERENCE_URL
          value: {{ include "prime-rl.inferenceUrls" . | quote }}
        {{- if .Values.modelCache.enabled }}
        - name: HF_HOME
          value: {{ .Values.modelCache.mountPath | quote }}
        {{- end }}
        {{- if eq .Values.inference.mode "dynamoGraph" }}
        - name: DYN_RL_DISCOVERY_URL
          value: "http://{{ .Release.Name }}-frontend-rl.{{ .Values.namespace }}.svc.cluster.local:8001"
        - name: DYN_RL_TOPOLOGY
          value: {{ required "inference.dynamoGraph.clientTopology is required" .Values.inference.dynamoGraph.clientTopology | toJson | quote }}
        {{- end }}
        {{- with .Values.orchestrator.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.config.secrets.enabled }}
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.config.secrets.name }}
              key: wandb-api-key
              optional: true
        {{- end }}
        {{- if .Values.huggingFace.tokenSecretName }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.huggingFace.tokenSecretName }}
              key: {{ .Values.huggingFace.tokenSecretKey }}
              optional: true
        {{- else if .Values.config.secrets.enabled }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.config.secrets.name }}
              key: hf-token
              optional: true
        {{- end }}
        resources:
          {{- toYaml .Values.orchestrator.resources | nindent 10 }}
        {{- if or .Values.storage.enabled .Values.modelCache.enabled }}
        volumeMounts:
        {{- if .Values.storage.enabled }}
        - name: shared-data
          mountPath: {{ .Values.storage.mountPath }}
        {{- end }}
        {{- if .Values.modelCache.enabled }}
        - name: model-cache
          mountPath: {{ .Values.modelCache.mountPath }}
        {{- end }}
        {{- end }}
      {{- if or .Values.storage.enabled .Values.modelCache.enabled }}
      volumes:
      {{- if .Values.storage.enabled }}
      - name: shared-data
        persistentVolumeClaim:
          claimName: {{ include "prime-rl.storageClaimName" . }}
      {{- end }}
      {{- if .Values.modelCache.enabled }}
      - name: model-cache
        persistentVolumeClaim:
          claimName: {{ required "modelCache.existingClaim is required when modelCache.enabled" .Values.modelCache.existingClaim }}
      {{- end }}
      {{- end }}
{{- end }}
---
{{- if and .Values.inference.enabled (eq .Values.inference.mode "statefulset") }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-inference
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "prime-rl.labels" . | nindent 4 }}
    {{- include "prime-rl.componentLabels" . | nindent 4 }}
    role: inference
spec:
  serviceName: {{ .Release.Name }}-inference-headless
  replicas: {{ .Values.inference.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "prime-rl.componentLabels" . | nindent 6 }}
      role: inference
  template:
    metadata:
      labels:
        {{- include "prime-rl.selectorLabels" . | nindent 8 }}
        {{- include "prime-rl.componentLabels" . | nindent 8 }}
        role: inference
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- if .Values.inference.runtimeClassName }}
      runtimeClassName: {{ .Values.inference.runtimeClassName }}
      {{- end }}
      containers:
      - name: prime-rl-inference
        image: {{ include "prime-rl.image" . | quote }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- if .Values.inference.autoStart }}
        command: ["/bin/bash", "-c"]
        args:
          - {{ .Values.inference.command }}
        {{- else }}
        command: ["sleep", "infinity"]
        {{- end }}
        ports:
        - containerPort: {{ .Values.inference.service.port }}
          name: api
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: ROLE
          value: "inference"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: STATEFUL_REPLICAS
          value: "{{ .Values.inference.replicas }}"
        - name: HEADLESS_SERVICE
          value: "{{ .Release.Name }}-inference-headless.{{ .Values.namespace }}.svc.cluster.local"
        {{- if .Values.modelCache.enabled }}
        - name: HF_HOME
          value: {{ .Values.modelCache.mountPath | quote }}
        {{- end }}
        {{- with .Values.inference.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.config.secrets.enabled }}
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.config.secrets.name }}
              key: wandb-api-key
              optional: true
        {{- end }}
        {{- if .Values.huggingFace.tokenSecretName }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.huggingFace.tokenSecretName }}
              key: {{ .Values.huggingFace.tokenSecretKey }}
              optional: true
        {{- else if .Values.config.secrets.enabled }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.config.secrets.name }}
              key: hf-token
              optional: true
        {{- end }}
        resources:
          requests:
            {{- if .Values.inference.gpu.enabled }}
            nvidia.com/gpu: {{ .Values.inference.gpu.count }}
            {{- end }}
            memory: {{ .Values.inference.resources.requests.memory }}
            cpu: {{ .Values.inference.resources.requests.cpu }}
          limits:
            {{- if .Values.inference.gpu.enabled }}
            nvidia.com/gpu: {{ .Values.inference.gpu.count }}
            {{- end }}
            {{- if .Values.inference.resources.limits }}
            memory: {{ .Values.inference.resources.limits.memory }}
            cpu: {{ .Values.inference.resources.limits.cpu }}
            {{- end }}
        {{- if and .Values.inference.probes .Values.inference.probes.enabled }}
        startupProbe:
          httpGet:
            path: /health
            port: {{ .Values.inference.service.port }}
          periodSeconds: {{ .Values.inference.probes.startup.periodSeconds }}
          failureThreshold: {{ .Values.inference.probes.startup.failureThreshold }}
          timeoutSeconds: {{ .Values.inference.probes.startup.timeoutSeconds }}
        livenessProbe:
          httpGet:
            path: /liveness
            port: {{ .Values.inference.service.port }}
          periodSeconds: {{ .Values.inference.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.inference.probes.liveness.failureThreshold }}
          timeoutSeconds: {{ .Values.inference.probes.liveness.timeoutSeconds }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.inference.service.port }}
          periodSeconds: {{ .Values.inference.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.inference.probes.readiness.failureThreshold }}
          timeoutSeconds: {{ .Values.inference.probes.readiness.timeoutSeconds }}
        {{- end }}
        {{- if or .Values.storage.enabled .Values.modelCache.enabled }}
        volumeMounts:
        {{- if .Values.storage.enabled }}
        - name: shared-data
          mountPath: {{ .Values.storage.mountPath }}
        {{- end }}
        {{- if .Values.modelCache.enabled }}
        - name: model-cache
          mountPath: {{ .Values.modelCache.mountPath }}
        {{- end }}
        {{- end }}
      {{- if or .Values.storage.enabled .Values.modelCache.enabled }}
      volumes:
      {{- if .Values.storage.enabled }}
      - name: shared-data
        persistentVolumeClaim:
          claimName: {{ include "prime-rl.storageClaimName" . }}
      {{- end }}
      {{- if .Values.modelCache.enabled }}
      - name: model-cache
        persistentVolumeClaim:
          claimName: {{ required "modelCache.existingClaim is required when modelCache.enabled" .Values.modelCache.existingClaim }}
      {{- end }}
      {{- end }}
{{- end }}
---
{{- if .Values.trainer.enabled }}
{{- $trainerPlacement := .Values.trainer }}
{{- if eq .Values.inference.mode "dynamoGraph" }}
{{- $trainerWorkload := required "canonical trainer workload is required" (index $dgdWorkload "trainer") }}
{{- $trainerPlacement = required "canonical trainer placement is required" (index $trainerWorkload "placement") }}
{{- end }}
