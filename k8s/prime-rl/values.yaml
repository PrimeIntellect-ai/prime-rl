# Default values for prime-rl
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
namespace: default

# Docker image configuration
image:
  repository: primeintellect/prime-rl
  pullPolicy: IfNotPresent
  tag: "main"

# Shared storage configuration
storage:
  enabled: true
  # If existingClaim is set, the chart will not create a PVC and will instead
  # mount the named claim. Useful for cluster-wide model caches (e.g. the
  # auto-provisioned `shared-model-cache` PVC documented at
  # work/ops/shared-model-cache.md) so models downloaded by other namespaces
  # are reused with zero re-download.
  existingClaim: ""
  # Used only when existingClaim is empty (chart creates the PVC).
  # Resulting PVC name: {{ .Release.Name }}-shared-data
  storageClassName: nfs
  accessModes:
    - ReadWriteMany
  size: 1Ti
  mountPath: /data

# Orchestrator component
orchestrator:
  enabled: true
  replicas: 1

  # Auto-start configuration (set to false to use sleep infinity for debugging)
  autoStart: false
  # Example command - use $INFERENCE_URL directly (comma-separated list of all inference server URLs)
  command: ""  # e.g., 'uv run orchestrator @ /app/examples/reverse_text/rl/orch.toml --output-dir /data/outputs/run_default --client.base-url $INFERENCE_URL'
  # $INFERENCE_URL is auto-set to: 'http://<release>-inference-0...:8000/v1,http://<release>-inference-1...:8000/v1,...'

  resources:
    requests:
      memory: "2Gi"
      cpu: "1"

  service:
    enabled: true
    type: ClusterIP
    port: 8000
    ncclPort: 29501

  env: []
  # - name: CUSTOM_ENV
  #   value: "value"

  nodeSelector: {}
    # nvidia.com/gpu.present: "true"  # Orchestrator doesn't need GPUs

  tolerations: []
    # - key: "nvidia.com/gpu"
    #   operator: "Exists"
    #   effect: "NoSchedule"

  imagePullSecrets: []
    # - name: regcred

  # Optional: name of an existing ConfigMap to mount at /configs in the
  # orchestrator container. Useful for shipping TOML configs without rebuilding
  # the image. Leave empty to skip.
  configMap: ""

# Inference component
inference:
  enabled: true
  replicas: 1

  # Auto-start configuration (set to false to use sleep infinity for debugging)
  autoStart: false
  command: ""  # e.g., "uv run inference @ /app/examples/reverse_text/rl/infer.toml"

  gpu:
    enabled: true
    count: 1

  # Dynamic Resource Allocation (DRA) — see trainer.resourceClaim for semantics.
  resourceClaim:
    enabled: false
    templateName: ""
    name: "gpus"

  # Optional: name of an existing ConfigMap to mount at /configs in the
  # inference container. Symmetric with orchestrator.configMap and
  # trainer.configMap. Lets a native vLLM inference server read its
  # infer.toml from a ConfigMap.
  configMap: ""

  resources:
    requests:
      memory: "4Gi"
      cpu: "1"

  service:
    enabled: true
    type: ClusterIP
    port: 8000

  runtimeClassName: nvidia

  tolerations: []
  imagePullSecrets: []

  # Health probes for inference server (/health for startup/readiness, /liveness for engine liveness)
  probes:
    enabled: false
    # Startup probe: allows long model loading time (up to 45 min by default)
    startup:
      periodSeconds: 10
      failureThreshold: 270  # 270 * 10s = 45 min max startup time
      timeoutSeconds: 5
    liveness:
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 10
    readiness:
      periodSeconds: 5
      failureThreshold: 2
      timeoutSeconds: 5

# Trainer component
trainer:
  enabled: true
  replicas: 1

  # Auto-start configuration (set to false to use sleep infinity for debugging)
  autoStart: false
  command: ""  # e.g., "uv run trainer @ /app/examples/reverse_text/rl/train.toml --output-dir /data/outputs"

  # Helps reduce CUDA memory fragmentation with PyTorch allocator
  pytorchCudaAllocConf: "expandable_segments:True"

  gpu:
    enabled: true
    count: 1

  # Dynamic Resource Allocation (DRA) — for DRA-only node pools that reject the
  # legacy `nvidia.com/gpu` device-plugin resource. When `resourceClaim.enabled`
  # is true the chart will NOT emit `nvidia.com/gpu` requests/limits and will
  # instead add a `spec.resourceClaims` entry to the pod and a `resources.claims`
  # reference inside the container.
  #   templateName: name of a pre-existing ResourceClaimTemplate in the same ns
  #   name:         logical claim name used to link pod <-> container
  resourceClaim:
    enabled: false
    templateName: ""
    name: "gpus"

  # Optional: name of an existing ConfigMap to mount at /configs in the
  # trainer container. Symmetric with `orchestrator.configMap`.
  configMap: ""

  resources:
    requests:
      memory: "4Gi"
      cpu: "1"

  service:
    enabled: true
    type: ClusterIP
    port: 8000
    ncclPort: 29501

  env: []

  runtimeClassName: nvidia

  tolerations: []
  imagePullSecrets: []

  # Health probes for trainer (requires metrics_server config)
  probes:
    enabled: false
    # Startup probe: allows time for model loading
    startup:
      periodSeconds: 10
      failureThreshold: 60  # 60 * 10s = 10 min max startup time
      timeoutSeconds: 30
    liveness:
      periodSeconds: 30
      failureThreshold: 6   # 6 * 30s = 3 min before restart
      timeoutSeconds: 30
    readiness:
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 30

# Additional configuration
config:
  # Example name (used for labeling)
  example: "reverse-text"

  # Secrets (optional)
  secrets:
    enabled: false
    name: prime-rl-secrets
    # wandbApiKey: ""
    # hfToken: ""
