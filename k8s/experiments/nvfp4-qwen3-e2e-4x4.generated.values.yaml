weightBroadcast:
  type: nccl
  port: 29501
trainer:
  replicas: 1
  gpu:
    enabled: true
    count: 4
  autoStart: true
inference:
  enabled: true
  islands: 1
  podsPerIsland: 1
  gpu:
    enabled: true
    count: 4
  autoStart: true
  tp: 4
  router:
    enabled: true
    scope: global
    policy: consistent_hash
    backendPort: 8001
orchestrator:
  enabled: true
  autoStart: true
  command: uv run --no-sync orchestrator @ /etc/prime-rl/orchestrator.toml
resumeCleanup:
  enabled: true
  outputDir: /data/nvfp4-e2e/runs/qwen3-30b-a3b-instruct-4x4
configs:
  trainer: "output_dir = \"/data/nvfp4-e2e/runs/qwen3-30b-a3b-instruct-4x4\"\nmatmul_precision = \"high\"\nmax_steps = 20\nenable_router_replay = false\ndist_timeout_seconds = 7200\nmax_concurrent_runs = 1\nenable_token_export = false\n\n[model]\nname = \"Qwen/Qwen3-30B-A3B-Instruct-2507\"\ntrust_remote_code = false\nconversion_dir = \"/data/nvfp4-e2e/model-conversions/qwen3-30b-a3b-instruct-2507\"\nseq_len = 8192\nattn = \"flash_attention_3\"\nfsdp_cpu_offload = false\noptim_cpu_offload = true\nreshard_after_forward = true\ndp_replicate = 1\nep = 4\nep_comm_backend = \"torch\"\ndeepep_num_sms = 20\ncp = 1\ncp_style = \"ring\"\nimpl = \"custom\"\noptimization_dtype = \"float32\"\nreduce_dtype = \"float32\"\nmoe_router_dtype = \"float32\"\nmoe_use_grouped_mm = true\nfreeze_moe_router = false\nfused_lm_head_token_chunk_size = 1024\n\n[model.compile]\nfullgraph = false\n\n[model.ac]\nmode = \"full\"\nfreq = 1\ntargets = [\n    \"norm\",\n]\n\n[model.debug]\nrandom_init = false\nforce_balanced_routing = false\n\n[tokenizer]\nname = \"Qwen/Qwen3-30B-A3B-Instruct-2507\"\ntrust_remote_code = false\n\n[data]\n\n[loss]\ntype = \"default\"\ndppo_mask_low = 0.2\ndppo_mask_high = 0.2\nadv_tau = 1.0\nkl_tau = 0.001\n\n[optim]\nlr = 1e-06\nweight_decay = 0.0\nmax_norm = 1.0\ntype = \"sign_sgd\"\n\n[scheduler]\ntype = \"constant\"\n\n[weight_broadcast]\nhost = \"localhost\"\nport = 29501\ntimeout = 7200\ninference_world_size = 4\ntype = \"nccl\"\nquantize_in_weight_transfer = false\n\n[rollout_transport]\ntype = \"filesystem\"\n\n[log]\nlevel = \"info\"\nvf_level = \"info\"\njson_logging = false\nlog_data = false\ninterval = 10.0\nranks_filter = [\n    0,\n]\n\n[file_monitor]\nfilename = \"trainer-metrics.jsonl\"\n\n[gc]\ninterval = 50\n\n[env_vars]\n"
  orchestrator: "pre_batch_filters = [\n    { type = \"gibberish\", enforce = false, token_id_threshold = 100000, logprob_offset = 2.0 },\n    { type = \"repetition\", enforce = false, window = 3000, prob_threshold = 0.99 },\n    { type = \"zero_advantage\", enforce = false },\n]\npost_batch_filters = []\ncollect_inference_metrics = true\noutput_dir = \"/data/nvfp4-e2e/runs/qwen3-30b-a3b-instruct-4x4/run_default\"\nbatch_size = 64\noversampling_factor = 1.0\nmax_inflight_rollouts = 64\ngroup_size = 8\nseq_len = 8192\nnum_train_workers = 4\nmax_steps = 20\nmax_off_policy_steps = 0\nbench = false\n\n[algo]\ntype = \"grpo\"\n\n[algo.sampling]\nsource = \"policy\"\n\n[model]\nname = \"Qwen/Qwen3-30B-A3B-Instruct-2507\"\ntrust_remote_code = false\n\n[model.client]\nwait_for_ready_timeout = 10800\nbase_url = [\n    \"http://nvfp4-qwen3-e2e-4x4-inference-0.nvfp4-qwen3-e2e-4x4-inference.dev-matej.svc.cluster.local:8000/v1\",\n]\napi_key_var = \"VLLM_API_KEY\"\nskip_model_check = false\ndp_rank_count = 1\nadmin_base_url = [\n    \"http://nvfp4-qwen3-e2e-4x4-inference-0.nvfp4-qwen3-e2e-4x4-inference.dev-matej.svc.cluster.local:8000/v1\",\n]\n\n[model.client.headers]\n\n[model.client.headers_from_env]\n\n[model.client.extra_headers_from_state]\nX-Session-ID = \"trajectory_id\"\n\n[[train.env]]\nname = \"math\"\n\n[train.env.env.taskset]\nid = \"i3_math_v1\"\n\n[train.env.env.agent.harness]\nid = \"null\"\n\n[train.env.env.agent.harness.runtime]\ntype = \"subprocess\"\n\n[train.sampling]\ntemperature = 1.0\nmax_completion_tokens = 2048\n\n[train.sampling.extra_body]\n\n[tokenizer]\nname = \"Qwen/Qwen3-30B-A3B-Instruct-2507\"\ntrust_remote_code = false\n\n[renderer]\nname = \"qwen3\"\nenable_thinking = false\n\n[optim]\nlr = 0.0001\n\n[log]\nlevel = \"info\"\nvf_level = \"info\"\njson_logging = false\nlog_data = false\ninterval = 10.0\n\n[env_vars]\n\n[file_monitor]\nfilename = \"orchestrator-metrics.jsonl\"\n\n[weight_broadcast]\nhost = \"localhost\"\nport = 29501\ntimeout = 7200\ninference_world_size = 4\ntype = \"nccl\"\nquantize_in_weight_transfer = false\n\n[rollout_transport]\ntype = \"filesystem\"\n"
  inference: 'enable_lora = false

    max_loras = 8

    max_cpu_loras = 100

    enable_prefix_caching = true

    gpu_memory_utilization = 0.85

    quantization = "nvfp4_per_token"

    api_server_count = 1

    data_parallel_rpc_port = 13345

    seed = 0

    enable_expert_parallel = false

    all2all_backend = "allgather_reducescatter"

    enable_eplb = false

    enable_dbo = false

    use_deep_gemm = false

    use_pd_kv_transfer = false

    enable_return_routed_experts = false

    enable_fp32_lm_head = true

    enable_fp32_router_logits = true


    [server]

    port = 8000

    liveness_timeout_seconds = 30.0


    [model]

    name = "Qwen/Qwen3-30B-A3B-Instruct-2507"

    trust_remote_code = false

    dtype = "bfloat16"

    max_model_len = 8192

    enforce_eager = true

    tool_call_parser = "hermes"


    [parallel]

    tp = 4

    dp = 1


    [log]

    level = "info"

    vf_level = "info"

    json_logging = false

    log_data = false

    interval = 10.0


    [env_vars]


    [weight_broadcast]

    type = "nccl"


    [vllm_extra]

    '
config:
  example: nvfp4-qwen3-e2e-4x4
  secrets:
    enabled: true
    name: prime-rl-secrets
image:
  repository: docker.io/primeintellect/prime-rl
  tag: commit-e96bbae
