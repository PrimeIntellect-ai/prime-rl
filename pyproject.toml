[project]
name = "prime-rl"
version = "0.4.0"
description = "Async RL Training at Scale"
readme = "README.md"
requires-python = "~=3.12.0"
dependencies = [
    "prime-rl-configs",
    "beartype>=0.21.0",
    "datasets>=4.0.0",
    "jaxtyping>=0.3.2",
    "liger-kernel>=0.5.10",
    "loguru>=0.7.3",
    "pyarrow>=21.0.0",
    "numpy>=2.2.6",
    "torch>=2.9.0",
    "torchvision",
    "torchaudio",
    "torchdata>=0.11.0",
    "transformers",
    "vllm>=0.20.2",
    "wandb>=0.26.1",
    "ring-flash-attn>=0.1.8",
    "prime>=0.6.4",
    "pyzmq>=27.1.0",
    "aiolimiter>=1.2.1",
    "tenacity>=8.2.0",
    "openai>=1.106.1",
    "rich>=14.0.0",
    "setproctitle>=1.3.0",
    "uvloop>=0.21.0",
    "torchtitan",
    "verifiers",
    "renderers",
    "dion",
    "tilelang>=0.1.8",
    "flash-linear-attention",
    "nvidia-ml-py>=12.575.51",
]

[project.scripts]
rl = "prime_rl.entrypoints.rl:main"
sft = "prime_rl.entrypoints.sft:main"
inference = "prime_rl.entrypoints.inference:main"
trainer = "prime_rl.trainer.rl.train:main"
orchestrator = "prime_rl.orchestrator.orchestrator:main"
env-server = "prime_rl.orchestrator.env_server.env_server:main"

[project.entry-points."vllm.general_plugins"]
prime_rl = "prime_rl.inference.patches:transformers_v5_compat"

[project.optional-dependencies]
flash-attn = [
    "flash-attn @ https://github.com/mjun0812/flash-attention-prebuild-wheels/releases/download/v0.9.4/flash_attn-2.8.3+cu128torch2.11-cp312-cp312-linux_x86_64.whl ; platform_machine == 'x86_64'",
]
flash-attn-3 = ["flash_attn_3"]

flash-attn-cute = [
    "flash-attn-4",
]
envs = [
    # from verifiers/environments/*
    "alphabet-sort",
    "browser-cua-example",
    "browser-dom-example",
    "continuation-quality",
    "doublecheck",
    "dspy-flights",
    "dspy-rlm",
    "gsm8k",
    "hello-group-reward-v1",
    "hello-mcp-harbor",
    "hello-parallel-sandbox-v1",
    "hello-rlm-v1",
    "hello-self-judge-v1",
    "hello-subagent-v1",
    "langchain-deep-agents-wikispeedia",
    "math-group",
    "math-python",
    "mcp-search-env",
    "mmmu",
    "nested-harness-v1",
    "openai-agents-env",
    "opencode-harbor",
    "reasoning-gym-env",
    "reverse-text",
    "rlm-swe-v1",
    "self-reward",
    "sentence-repeater",
    "terminus-harbor",
    "tool-test",
    "toxicity-explanation",
    "wiki-search",
    "wordle",
    # from research-environments/environments/*
    "aime2024",
    "aime2025",
    "aime2026",
    "apex-shortlist",
    "bfcl-v3",
    "browsecomp",
    "clbench",
    "code-env",
