disagg = [
    "deep-ep ; platform_machine == 'x86_64'",
    "deep-gemm ; platform_machine == 'x86_64'",
    "nixl",
    "nixl-cu12 ; platform_machine == 'x86_64'",
    "vllm-router ; platform_machine == 'x86_64'",
]
gpt-oss = [
    "kernels",
]
quack = [
    "quack-kernels>=0.3.3",
]
all = [
    "prime-rl[flash-attn]",
    "prime-rl[disagg]",
    "prime-rl[quack]",
    "prime-rl[flash-attn-3]",
    "prime-rl[flash-attn-cute]",
]

[dependency-groups]
mamba-ssm = [
    "mamba-ssm>=2.3.0",
]
dev = [
    "ipykernel>=6.29.5",
    "ipywidgets>=8.1.7",
    "pre-commit>=4.2.0",
    "pytest>=8.4.1",
    "ruff>=0.12.1",
]


[tool.uv.workspace]
members = [
    "packages/prime-rl-configs",
    "packages/verifiers",
    "packages/verifiers/environments/*",
    "packages/renderers",
    "packages/research-environments/environments/*",
]
# Env packages excluded from the workspace:
# - verifiers/environments/bfcl_v3: collides with research-environments/environments/bfcl_v3 (kept)
# - research-environments/environments/clbench_rlm: pins verifiers to a non-workspace git URL
# - research-environments/environments/terminal_bench_2: pins verifiers to a non-workspace git URL
exclude = [
    "packages/verifiers/environments/bfcl_v3",
    "packages/research-environments/environments/clbench_rlm",
    "packages/research-environments/environments/terminal_bench_2",
    # tau2 package has three incompatible forks across these envs — pick none for now
    "packages/verifiers/environments/tau2_bench_v1",
    "packages/research-environments/environments/tau2_bench",
    "packages/research-environments/environments/tau2_synth",
    "packages/research-environments/environments/tau3_bench",
    "packages/research-environments/environments/tau3_bench_rlm",
    # gem-wordle pins nltk==3.9.1 (via gem-llm) but wordle requires nltk>=3.9.2
    "packages/verifiers/environments/gem_wordle",
    # scicode-core's google-generativeai pins protobuf incompatibly with mcp-atlas/opencode-deepdive
    "packages/research-environments/environments/scicode",
    # verifiers[openenv] requires openenv-core>=0.3.0 but only <=0.2.3 is available
    "packages/verifiers/environments/openenv_echo",
    "packages/verifiers/environments/openenv_textarena",
]

[tool.uv]
exclude-newer = "7 days"
preview = true
no-build-isolation-package = ["flash-attn"]
environments = [
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
    "sys_platform == 'linux' and platform_machine == 'aarch64'",
]
# Override torch's pinned cuDNN to fix Conv3d performance regression (torch 2.9 + cuDNN 9.8-9.14)
# See: https://github.com/pytorch/pytorch/issues/166122
override-dependencies = [
    "nvidia-cudnn-cu12>=9.15",
    "nvidia-cutlass-dsl>=4.4.1",
    "transformers>=5.1.0.dev0",
    # verifiers[rl] pins torch<2.9; prime-rl needs torch>=2.9. Force our version.
    "torch>=2.9.0",
    # verifiers[openenv] requires openenv-core>=0.3.0 (not yet published); allow current PyPI.
    "openenv-core",
]

[tool.uv.exclude-newer-package]
# we want latest vllm, remove next patch
vllm = false
flash_attn_3 = false
# PrimeIntellect-published on PyPI (trusted publisher)
prime = false
prime-sandboxes = false
prime-tunnel = false
prime-evals = false
# Trusted git/URL sources pinned by rev or wheel URL (defensive: belt-and-suspenders)
vllm-router = false
dion = false
pydantic-config = false
deep-ep = false
deep-gemm = false
nixl-cu12 = false

