    "deepdive",
    "deepdive-rlm",
    "frontierscience",
    "general-agent",
    "gpqa",
    "graphwalks",
    "graphwalks-rlm",
    "harbor",
    "hle",
    "ifbench",
    "ifeval",
    "if-summarize-judge",
    "livecodebench",
    "logic-env",
    "longbenchpro-rlm",
    "longcot-rlm",
    "math500",
    "math-env",
    "math-env-rlm",
    "mcp-atlas",
    "mini-swe-agent-plus",
    "mini-swe-agent-plus-rlm",
    "mmlu-pro",
    "mrcr-v2-rlm",
    "needle-in-haystack-rlm",
    "nl2repobench",
    "oolong-rlm",
    "opencode-cp",
    "opencode-deepdive",
    "opencode-lean",
    "opencode-math",
    "opencode-science",
    "opencode-swe",
    "passthrough",
    "patterned-needle-in-haystack",
    "patterned-needle-in-haystack-rlm",
    "pinchbench",
    "rlm-browsecomp",
    "rlm-deepdive",
    "rlm-graphwalks",
    "rlm-lean",
    "rlm-longcot",
