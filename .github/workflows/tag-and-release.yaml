name: Tag and Release

on:
  push:
    branches:
      - main
    tags:
      # Stable release tags only. `.dev` tags are created by `devx_tag.yaml`
      # via GITHUB_TOKEN (which does not retrigger workflows), so they would
      # not arrive here anyway — this exclusion is defensive for manual pushes.
      - 'v*'
      - '!v*dev*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.6.0)'
        required: true
        type: string

jobs:
  auto-tag-on-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.tag.outputs.created }}
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version bump and create tag
        id: tag
        env:
          BEFORE_SHA: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "created=false" >> "$GITHUB_OUTPUT"

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No valid base commit available; skipping auto-tag."
            exit 0
          fi

          OLD_VERSION=$(git show "$BEFORE_SHA:pyproject.toml" | sed -n 's/^version = "\([^"]*\)"$/\1/p' | head -n1)
          if [ -z "$OLD_VERSION" ]; then
            echo "Could not find version in previous pyproject.toml" >&2
            exit 1
          fi

          NEW_VERSION=$(python - <<'PY'
          from pathlib import Path
          import re
          import sys

          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"', Path("pyproject.toml").read_text())
          if not match:
              sys.exit("Could not find version in current pyproject.toml")
          print(match.group(1))
          PY
          )

          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "No version change detected in pyproject.toml; skipping auto-tag."
            exit 0
          fi

          TAG="v${NEW_VERSION}"

          # Check release notes BEFORE pushing the tag, so a missing notes
          # file does not leave a stray tag on the remote.
          NOTES="assets/release/RELEASE_${TAG}.md"
          if [ ! -f "$NOTES" ]; then
            echo "Release notes file $NOTES not found." >&2
            echo "Add it in the same PR that bumps the version on main." >&2
            exit 1
          fi

          TAG_EXISTS_LOCAL=false
          TAG_EXISTS_REMOTE=false
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            TAG_EXISTS_LOCAL=true
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            TAG_EXISTS_REMOTE=true
          fi

          if [ "$TAG_EXISTS_LOCAL" = "true" ] || [ "$TAG_EXISTS_REMOTE" = "true" ]; then
            # Tag exists. If a GitHub Release already exists too, skip entirely;
            # otherwise still emit outputs so release-from-auto-tag can publish
            # against the existing tag (covers retries after a partial failure).
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Tag ${TAG} and Release ${TAG} already exist; nothing to do."
              exit 0
            fi
            echo "Tag ${TAG} already exists but no GitHub Release found; will publish."
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  release-from-auto-tag:
    needs: auto-tag-on-main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.auto-tag-on-main.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout auto-created tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.auto-tag-on-main.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-tag-on-main.outputs.tag }}
          name: ${{ needs.auto-tag-on-main.outputs.tag }}
          body_path: assets/release/RELEASE_${{ needs.auto-tag-on-main.outputs.tag }}.md

  tag-and-release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tagged release (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag }}

      - name: Checkout tagged release (push)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSHED_REF: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$PUSHED_REF"
          fi

          if [ -z "$TAG" ]; then
            echo "Unable to determine release tag" >&2
            exit 1
          fi

          case "$TAG" in
            v*)
              ;;
            *)
              echo "Release tags must be prefixed with 'v' (received '$TAG')" >&2
              exit 1
              ;;
          esac

          VERSION="${TAG#v}"
          FILE_VERSION=$(python - <<'PY'
          from pathlib import Path
          import re
          import sys

          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"', Path("pyproject.toml").read_text())
          if not match:
              sys.exit("Could not find version in pyproject.toml")
          print(match.group(1))
          PY
          )

          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "Version mismatch: tag requests '$VERSION' but pyproject.toml defines '$FILE_VERSION'" >&2
            exit 1
          fi

          NOTES="assets/release/RELEASE_${TAG}.md"
          if [ ! -f "$NOTES" ]; then
            echo "Release notes file $NOTES not found." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          body_path: assets/release/RELEASE_${{ steps.release.outputs.tag }}.md
