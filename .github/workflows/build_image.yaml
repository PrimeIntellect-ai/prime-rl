name: Build Image (ghcr)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to build"
        required: false
        default: "main"
        type: string
      tag:
        description: "Image tag (defaults to sanitized ref)"
        required: false
        type: string
      platforms:
        description: "Target platforms to build"
        required: false
        default: "both"
        type: choice
        options:
          - amd64-only
          - arm64-only
          - both

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: primeintellect-ai/prime-rl
  BUILD_REF: ${{ inputs.ref || github.ref_name }}
  BUILD_TAG: ${{ inputs.tag || '' }}
  BUILD_PLATFORMS: ${{ inputs.platforms || 'both' }}

concurrency:
  group: build-image-${{ inputs.tag || inputs.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize dispatcher
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require maintain or admin
        # Gate MANUAL dispatches only; other events (e.g. release) are
        # already privileged and pass through. Guard the step, not the job —
        # a skipped job would skip `prepare` via `needs: authorize`.
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.triggering_actor }}
          REPO: ${{ github.repository }}
        run: |
          # Restricted to repo members with maintain or admin. Automated
          # in-repo dispatches (devx_tag dev-image builds, the release build)
          # run as github-actions[bot] via GITHUB_TOKEN — allow those through.
          if [ "$ACTOR" = "github-actions[bot]" ]; then
            echo "Dispatcher is repo automation ($ACTOR); allowed."
            exit 0
          fi
          role=$(gh api "repos/${REPO}/collaborators/${ACTOR}/permission" --jq '.role_name' 2>/dev/null || true)
          echo "Dispatcher $ACTOR has repo role: ${role:-<none>}"
          case "$role" in
            admin|maintain)
              echo "Authorized." ;;
            *)
              echo "::error::$ACTOR (role: ${role:-none}) is not allowed to trigger image builds; requires maintain or admin." >&2
              exit 1 ;;
          esac

  prepare:
    name: Prepare build
    needs: authorize
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      ref: ${{ steps.vars.outputs.ref }}
      tag: ${{ steps.vars.outputs.tag }}
      sha: ${{ steps.vars.outputs.sha }}
      full_sha: ${{ steps.vars.outputs.full_sha }}
      platforms: ${{ steps.vars.outputs.platforms }}
    steps:
      - name: Set build matrix
        id: matrix
        env:
          PLATFORMS: ${{ env.BUILD_PLATFORMS }}
        run: |
          case "$PLATFORMS" in
            arm64-only)
              echo 'matrix={"include":[{"runner":"image-builder-arm-2204","platform":"linux/arm64","suffix":"arm64"}]}' >> "$GITHUB_OUTPUT"
              ;;
            both)
              echo 'matrix={"include":[{"runner":"image-builder","platform":"linux/amd64","suffix":"amd64"},{"runner":"image-builder-arm-2204","platform":"linux/arm64","suffix":"arm64"}]}' >> "$GITHUB_OUTPUT"
              ;;
            amd64-only)
              echo 'matrix={"include":[{"runner":"image-builder","platform":"linux/amd64","suffix":"amd64"}]}' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported platforms value: ${PLATFORMS}" >&2
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BUILD_REF }}
          fetch-depth: 0

      - name: Resolve image vars
        id: vars
        env:
          INPUT_REF: ${{ env.BUILD_REF }}
          INPUT_TAG: ${{ env.BUILD_TAG }}
          PLATFORMS: ${{ env.BUILD_PLATFORMS }}
        run: |
          if [ -n "$INPUT_TAG" ] && [ "$INPUT_TAG" != "$INPUT_REF" ] && [ "$INPUT_REF" != "main" ]; then
            echo "custom 'tag' that differs from 'ref' is only allowed when ref=main; got ref='${INPUT_REF}' tag='${INPUT_TAG}'" >&2
            exit 1
          fi

          sanitize() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | cut -c1-50
          }

          # A ref that is exactly a git tag builds under that tag verbatim;
          # any other ref (branch / arbitrary commit) is prefixed with
          # `git describe` so the tag carries the nearest release, commit
          # distance and short sha (e.g. v0.7.0-42-g1a2b3c4d5-fix-my-branch)
          # and can't collide with a clean release tag.
          if [ -n "$INPUT_TAG" ]; then
            tag=$(sanitize "$INPUT_TAG")
          elif tag=$(git describe --tags --exact-match 2>/dev/null); then
            :
          else
            tag="$(git describe --tags --always)-$(sanitize "$INPUT_REF")"
          fi

          if [ -z "$tag" ]; then
            echo "Could not derive a valid image tag from ref='${INPUT_REF}' tag='${INPUT_TAG}'." >&2
            exit 1
          fi

          echo "ref=${INPUT_REF}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "full_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "platforms=${PLATFORMS}" >> "$GITHUB_OUTPUT"

  build:
    name: Build and push (${{ matrix.suffix }})
    needs: prepare
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Remove unnecessary packages
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0
          submodules: false

      - name: Init public submodules
        run: |
          if [ -f .gitmodules ]; then
            git config --global url."https://github.com/".insteadOf "git@github.com:"
            git submodule update --init --recursive -- deps/pydantic-config deps/verifiers deps/renderers deps/research-environments
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.cuda
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.tag }}-${{ matrix.suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:commit-${{ needs.prepare.outputs.sha }}-${{ matrix.suffix }}
          labels: |
            org.opencontainers.image.revision=${{ needs.prepare.outputs.full_sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.tag }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Summary
        env:
          INPUT_REF: ${{ needs.prepare.outputs.ref }}
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
          IMAGE_SHA: ${{ needs.prepare.outputs.sha }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          PLATFORM: ${{ matrix.platform }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          {
            echo "## Build Summary (${SUFFIX})"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Ref** | \`${INPUT_REF}\` |"
            echo "| **Platform** | \`${PLATFORM}\` |"
            echo "| **Image** | \`${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}-${SUFFIX}\` |"
            echo "| **Commit** | \`${IMAGE_SHA}\` |"
            echo "| **Digest** | \`${IMAGE_DIGEST}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  manifest:
    name: Create multi-arch manifest
    needs: [prepare, build]
    if: needs.prepare.outputs.platforms == 'both'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
          IMAGE_SHA: ${{ needs.prepare.outputs.sha }}
          IMAGE_FULL_SHA: ${{ needs.prepare.outputs.full_sha }}
          PLATFORMS: ${{ needs.prepare.outputs.platforms }}
          SOURCE_URL: https://github.com/${{ github.repository }}
        run: |
          set -euo pipefail

          image="${REGISTRY}/${IMAGE_NAME}"
          tag_sources=()
          sha_sources=()

          if [ "$PLATFORMS" != "arm64-only" ]; then
            tag_sources+=("${image}:${IMAGE_TAG}-amd64")
            sha_sources+=("${image}:commit-${IMAGE_SHA}-amd64")
          fi

          if [ "$PLATFORMS" != "amd64-only" ]; then
            tag_sources+=("${image}:${IMAGE_TAG}-arm64")
            sha_sources+=("${image}:commit-${IMAGE_SHA}-arm64")
          fi

          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.revision=${IMAGE_FULL_SHA}" \
            --annotation "index:org.opencontainers.image.version=${IMAGE_TAG}" \
            --annotation "index:org.opencontainers.image.source=${SOURCE_URL}" \
            -t "${image}:${IMAGE_TAG}" \
            "${tag_sources[@]}"

          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.revision=${IMAGE_FULL_SHA}" \
            --annotation "index:org.opencontainers.image.version=${IMAGE_TAG}" \
            --annotation "index:org.opencontainers.image.source=${SOURCE_URL}" \
            -t "${image}:commit-${IMAGE_SHA}" \
            "${sha_sources[@]}"

      - name: Summary
        env:
          INPUT_REF: ${{ needs.prepare.outputs.ref }}
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
          IMAGE_SHA: ${{ needs.prepare.outputs.sha }}
          PLATFORMS: ${{ needs.prepare.outputs.platforms }}
        run: |
          {
            echo "## Manifest Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Ref** | \`${INPUT_REF}\` |"
            echo "| **Platforms** | \`${PLATFORMS}\` |"
            echo "| **Image** | \`${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}\` |"
            echo "| **Commit Image** | \`${REGISTRY}/${IMAGE_NAME}:commit-${IMAGE_SHA}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
