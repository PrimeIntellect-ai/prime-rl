name: Build Image (ghcr)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to build"
        required: false
        default: "main"
        type: string
      tag:
        description: "Image tag (defaults to sanitized ref)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: primeintellect-ai/prime-rl

jobs:
  build:
    name: Build and push to ghcr
    runs-on: image-builder
    permissions:
      contents: read
      packages: write
    steps:
      - name: Remove unnecessary packages
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Resolve image tag
        id: vars
        env:
          INPUT_REF: ${{ inputs.ref }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG=$(echo "$INPUT_REF" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/--*/-/g' | cut -c1-50 | sed 's/^-//;s/-$//')
          fi
          SHA=$(git rev-parse --short HEAD)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.cuda
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:commit-${{ steps.vars.outputs.sha }}

      - name: Summary
        env:
          INPUT_REF: ${{ inputs.ref }}
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
          IMAGE_SHA: ${{ steps.vars.outputs.sha }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## Build Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Ref** | \`${INPUT_REF}\` |"
            echo "| **Image** | \`${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}\` |"
            echo "| **Commit** | \`${IMAGE_SHA}\` |"
            echo "| **Digest** | \`${IMAGE_DIGEST}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
