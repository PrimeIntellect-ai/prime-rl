name: Docs reference

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "packages/prime-rl-configs/src/prime_rl/configs/**"
      - "scripts/generate_docs_reference.py"
      - "docs/reference.md"
      - ".github/workflows/docs-reference.yaml"

jobs:
  reference-in-sync:
    name: docs/reference.md in sync with configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init public submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive -- deps/verifiers deps/renderers deps/research-environments deps/pydantic-config
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --all-extras --locked
      - name: Regenerate reference.md
        run: uv run python scripts/generate_docs_reference.py
      - name: Fail if reference.md drifted
        run: |
          if ! git diff --exit-code docs/reference.md; then
            echo "::error::docs/reference.md is out of sync with the configs."
            echo "Run: uv run python scripts/generate_docs_reference.py"
            exit 1
          fi
