services:
  redis:
    image: redis:8-alpine
    network_mode: host
    command: ["redis-server", "--port", "29502"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "29502", "ping"]
      interval: 5s
      retries: 3
      start_period: 5s
    restart: "no"

  modelexpress-server:
    build:
      context: https://github.com/ai-dynamo/modelexpress.git#b0c94ed61c65d2c2355a18508977941b9946d8b5
    network_mode: host
    environment:
      - MODEL_EXPRESS_SERVER_PORT=29503
      - MODEL_EXPRESS_LOG_LEVEL=info
      - MX_METADATA_BACKEND=redis
      - REDIS_URL=redis://localhost:29502
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/29503"]
      interval: 5s
      retries: 12
      start_period: 5s
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
