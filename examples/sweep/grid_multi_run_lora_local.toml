# Multi-run-LoRA sweep, self-contained on a single multi-GPU machine.
#
# Same workflow as grid_multi_run_lora.toml but uses a local inference
# server (rl_multi_run_lora.toml) instead of pointing at a remote rig.
# Useful when you have ≥2 GPUs on one box and don't want to set up
# disagg.
#
# Run:
#   VLLM_ALLOW_RUNTIME_LORA_UPDATING=True uv run sweep @ examples/sweep/grid_multi_run_lora_local.toml
name = "reverse-text-multi-run-lora-local"
entrypoint = "rl"
base = ["examples/sweep/rl_multi_run_lora.toml"]
output_dir = "outputs/studies/reverse-text-multi-run-lora-local"

[scheduler]
type = "multi_run_lora"
max_concurrent_runs = 3
shared = ["examples/sweep/rl_multi_run_lora.toml"]

[objective]
metric = "reward/reverse-text/mean"
direction = "maximize"

[parameters."orchestrator.optim.lr"]
values = [1e-6, 3e-6, 1e-5]
