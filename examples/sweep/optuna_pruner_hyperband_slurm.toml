# Optuna + Hyperband pruner over the synchronous SLURM scheduler.
#
# Hyperband runs multiple ASHA brackets in parallel, each with a different
# min_resource value, to hedge across resource budgets — instead of picking
# one min_resource and one reduction_factor like ASHA, Hyperband sweeps
# across several so neither extreme of "prune too early" nor "prune too
# late" dominates.
#
# How it works on SLURM-sync: each trial is submitted via `sbatch --parsable`
# (captures the job id), the controller polls shared-FS metrics.jsonl while
# the job runs, forwards (step, value) reports to `optuna_trial.report`,
# and on `should_prune()` issues `scancel <jobid>`. Trials are serialized at
# the controller, so Hyperband's adaptive behavior is preserved even though
# the wall-clock concurrency is one.
#
# Trials need enough steps for Hyperband's outer ASHA brackets to fire.
# Tune min_resource (smallest bracket), max_resource (largest bracket),
# and reduction_factor to your trial step budget. Setting max_resource to
# the trial's max_steps is a common choice.
#
# Requires a shared filesystem between the controller and compute nodes
# so the controller can read metrics.jsonl as the trial writes it.
#
# Run:
#   uv run sweep @ examples/sweep/optuna_pruner_hyperband_slurm.toml
name = "reverse-text-optuna-hyperband-slurm"
entrypoint = "rl"
base = ["examples/reverse_text/rl.toml", "examples/sweep/slurm_base.toml"]
output_dir = "outputs/studies/reverse-text-optuna-hyperband-slurm"

[strategy]
type = "optuna"
num_trials = 16
seed = 42
sampler = "tpe"
poll_interval_seconds = 10.0

[strategy.pruner]
type = "hyperband"
min_resource = 1
max_resource = 30
reduction_factor = 3

[scheduler]
type = "slurm"
synchronous = true

[objective]
metric = "reward/reverse-text/mean"
direction = "maximize"

[parameters."trainer.optim.lr"]
distribution = "log_uniform"
min = 1e-7
max = 1e-4
