# Grid search over learning rate for the reverse-text RL example.
#
# Demonstrates: basic sweep entrypoint, grid strategy, local scheduler.
# Each trial spawns its own `uv run rl @ examples/sweep/rl.toml @
# <overrides.toml>` subprocess and writes artifacts under
# `output_dir/trials/<trial_id>/`.
#
# Run with:
#   uv run sweep @ examples/sweep/grid_local.toml
name = "reverse-text-lr"
entrypoint = "rl"
base = ["examples/sweep/rl.toml"]
output_dir = "outputs/studies/reverse-text-lr"

[strategy]
type = "grid"

[scheduler]
type = "local"
max_parallel = 1

[objective]
metric = "reward/reverse-text/mean"
direction = "maximize"

[parameters."trainer.optim.lr"]
values = [1e-6, 3e-6, 1e-5]
