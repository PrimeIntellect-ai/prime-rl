# SFT entrypoint over the synchronous SLURM scheduler.
#
# Demonstrates: a non-RL entrypoint going through the same controller
# loop. The SFT sbatch template runs torchrun and exits naturally when
# training completes — no self-scancel is needed because the SFT trainer
# isn't a long-lived orchestrator. sbatch --wait carries the trainer's
# exit code back to the controller directly, so SLURM accounting
# (sacct/scontrol) is not on the critical path for the completed/failed
# decision.
#
# Requires:
#   - sbatch on PATH.
#   - A reachable SLURM cluster.
#   - Edit examples/sweep/sft_slurm_base.toml to match your cluster
#     ([slurm] partition/account/time + [deployment] gpus_per_node /
#     num_nodes).
#
# Run:
#   uv run sweep @ examples/sweep/sft_slurm.toml
name = "reverse-text-sft-slurm"
entrypoint = "sft"
base = ["examples/reverse_text/sft.toml", "examples/sweep/sft_slurm_base.toml"]
output_dir = "outputs/studies/reverse-text-sft-slurm"

[strategy]
type = "grid"

[scheduler]
type = "slurm"
synchronous = true

[objective]
metric = "loss/mean"
direction = "minimize"

# Disabled so a fresh cluster can run this example without configuring
# wandb on every compute node. Flip enabled=true once `wandb login` has
# been run on each node the sweep might land on.
[wandb]
enabled = false

[parameters."optim.lr"]
values = [1e-5, 2e-5, 5e-5]
