max_steps = 4
seq_len = 2048

[model]
name = "Qwen/Qwen3-0.6B"

[deployment]
type = "single_node"
num_train_gpus = 1
num_infer_gpus = 0

[weight_broadcast]
type = "nccl"
host = "127.0.0.1"
inference_world_size = 1

[trainer]

[orchestrator]
batch_size = 32
group_size = 4

[orchestrator.model.client]
base_url = ["http://127.0.0.1:8000/v1"]
dynamo_discovery_url = "http://127.0.0.1:8001"
wait_for_ready_timeout = 1800

[orchestrator.model.client.extra_headers_from_state]
X-Session-ID = "trajectory_id"
X-Dynamo-Session-ID = "trajectory_id"

[orchestrator.renderer]
name = "auto"
thinking_retention = "all"

[orchestrator.train.sampling]
max_completion_tokens = 2048

[[orchestrator.train.env]]
name = "math"
taskset = { id = "math-env-v1", dataset_name = "openai/gsm8k", dataset_subset = "main" }
harness = { id = "null", runtime = { type = "subprocess" } }
