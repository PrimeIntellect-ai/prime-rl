# Usage: uv run rl @ examples/reverse_text/rl.toml @ examples/reverse_text/dynamo_disaggregated_rl.toml @ examples/reverse_text/slurm_rl.toml

[weight_broadcast]
type = "nccl"

[trainer]

[orchestrator]

[deployment]
type = "single_node"
gpus_per_node = 3
num_train_gpus = 1
num_infer_gpus = 2

[inference]
enable_expert_parallel = false

[inference.backend]
type = "dynamo"

[inference.parallel]
tp = 1
dp = 1

[inference.deployment]
type = "disaggregated"
gpus_per_node = 1
prefill_nodes_per_replica = 1
decode_nodes_per_replica = 1
num_prefill_replicas = 1
num_decode_replicas = 1
