# 3-node P/D disaggregation under the llm-d router (EPP + Envoy + pd-sidecar that
# disaggregates /inference/v1/generate). 1 prefill node + 1 decode node + 1 trainer
# node. Qwen3-30B-A3B wide-EP, NIXL prefill->decode.
#
# Usage: source .env && uv run rl @ examples/llmd/pd.toml
output_dir = "outputs/llmd-pd-smoke"
clean_output_dir = true
max_steps = 3
seq_len = 2048

[slurm]
job_name = "hendrycks-math-rl-moe"

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 2

[log]
level = "debug"

[wandb]
project = "hendrycks-math-debug"
name = "hendrycks-math"

[weight_broadcast]
type = "nccl"

[model]
name = "Qwen/Qwen3-30B-A3B-Thinking-2507"

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
optim_cpu_offload = true

[trainer.model.ac_offloading]
max_inflight_activations = 5

[trainer.model.ac]
freq = 1

[orchestrator]
batch_size = 512
group_size = 16

[orchestrator.train.sampling]
max_completion_tokens = 2048

[[orchestrator.train.env]]
id = "math-env"
name = "hendrycks-math"
args = { dataset_name = "PrimeIntellect/Hendrycks-Math", dataset_subset = "default", math_verify_max_workers = 128, math_verify_timeout = 60 }

[inference.deployment]
type = "disaggregated"
num_prefill_nodes = 1
num_decode_nodes = 1

[inference.deployment.router]
type = "llm-d"

[inference.parallel]
tp = 1
