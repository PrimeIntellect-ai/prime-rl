# Multi-node external-LB data parallelism with the existing vllm-router.
# reverse_text (Qwen3-0.6B, renderer/TITO path): 1 trainer node + 1 inference
# node running 8 per-rank vLLM endpoints (tp=1) behind one vllm-router.
#
# Usage: source .env && uv run rl @ examples/llmd/external_lb.toml
output_dir = "outputs/llmd-external-lb-smoke"
clean_output_dir = true
max_steps = 5
seq_len = 2048

[slurm]
job_name = "llmd-extlb-smoke"

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 1

[weight_broadcast]
type = "nccl"

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[wandb]
project = "reverse-text"
name = "reverse-text"

[orchestrator]
batch_size = 128
group_size = 16

[orchestrator.train.sampling]
max_completion_tokens = 128

[[orchestrator.train.env]]
id = "reverse-text"

# Model not in MODEL_RENDERER_MAP — opt into DefaultRenderer (apply_chat_template).
[orchestrator.renderer]
name = "default"

[trainer.optim]
lr = 3e-6

[inference.parallel]
tp = 1
