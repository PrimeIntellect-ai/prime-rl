# Multi-node llm-d router (EPP + Envoy, file-discovery) on the renderer/TITO path.
# reverse_text (Qwen3-0.6B): 1 trainer node + 1 inference node running 8 per-rank
# vLLM endpoints behind the llm-d EPP+Envoy.
#
# Usage: source .env && uv run rl @ examples/llmd/llmd_simple.toml
output_dir = "outputs/llmd-simple-smoke"
clean_output_dir = true
max_steps = 5
seq_len = 2048

[slurm]
job_name = "llmd-simple-smoke"

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 1

[weight_broadcast]
type = "nccl"

[inference.deployment.router]
type = "llm-d"

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[wandb]
project = "reverse-text"
name = "reverse-text"

[orchestrator]
batch_size = 128
group_size = 16

[orchestrator.train.sampling]
max_completion_tokens = 128

[[orchestrator.train.env]]
id = "reverse-text"

# Model not in MODEL_RENDERER_MAP — opt into DefaultRenderer (apply_chat_template).
[orchestrator.renderer]
name = "default"

[trainer.optim]
lr = 3e-6

[inference.parallel]
tp = 1
