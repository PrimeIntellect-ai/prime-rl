max_steps = 500

[wandb]
project = "arc-codegen"
name = "arc-codegen-4b-lora"

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[orchestrator]
batch_size = 64
rollouts_per_example = 8

[orchestrator.sampling]
max_tokens = 12288
temperature = 1.0

[orchestrator.wandb.log_extras]
samples = true
interval = 1

[[orchestrator.env]]
id = "arc-codegen"
name = "arc_codegen"
args = { num_examples = 200, sort_by_size = true }

[ckpt]
interval = 50
keep_last = 3

[trainer]

[trainer.model.lora]
rank = 32

[inference]
enable_lora = true

[inference.model]
max_model_len = 16384
