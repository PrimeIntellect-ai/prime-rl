output_dir = "outputs/bias_detector_v47"
max_steps = 150
seq_len = 12288

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "self-play"
name = "bias-detector-v47-ultimate-combo"
offline = false

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[orchestrator]
batch_size = 24
rollouts_per_example = 4
use_verifier_step_advantages = true
use_token_client = false

[orchestrator.sampling]
max_tokens = 1024
temperature = 1.2

# V47: Ultimate combo — combines ALL winning features:
# 1. disc_iterative (V31: MAE 0.726→0.448, -38%)
# 2. Filtered corpus (V45: remove 51% of synthetic articles with bad C1 labels)
# 3. C1-balanced sampling (V45: equalize C1 distribution)
# 4. Topic deconfounding (V46: same-topic contrastive examples)
# 5. Difficulty boost (V43: 2x advantage for subtle articles)
# 6. Quote masking (V28: 30% of rollouts strip quotes)
# 7. Mixed prompt (V28: randomly vary prompt type for robustness)
# This is the "kitchen sink" — everything that showed individual improvement.
[[orchestrator.env]]
id = "bias_detector"
name = "bias_detector"
args = { advantage_center = 0.3, gen_advantage_scale = 0.0, disc_advantage_scale = 2.0, disc_per_criterion_scales = [1.5, 2.0, 0.5], disc_num_examples = 5, disc_diverse_examples = true, disc_topic_hint = true, disc_mixed_prompt = true, disc_mask_quotes = 0.3, disc_iterative = true, disc_topic_deconfound = true, disc_difficulty_boost = 1.0, synthetic_max_mismatch = 2, c1_balance = true, use_real_articles = true, use_corpus = true, real_oversample = 10, num_seed_rows = 1000 }

[orchestrator.val]
interval = 10
num_examples = 24

[orchestrator.model.lora]
name = "r8-1e-5"

[trainer.optim]
lr = 1e-5

[trainer.model.lora]
rank = 8

[trainer.ckpt.weights]
save_adapter_separately = true

[ckpt]
interval = 25

[inference]
enable_lora = true
gpu_memory_utilization = 0.7
