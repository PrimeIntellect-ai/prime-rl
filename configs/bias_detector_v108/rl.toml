output_dir = "outputs/bias_detector_v108"
max_steps = 150
seq_len = 12288

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "self-play"
name = "bias-detector-v108-selfcorrect-then-oracle"
offline = false

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[orchestrator]
batch_size = 24
rollouts_per_example = 4
use_verifier_step_advantages = true
use_token_client = false

[orchestrator.sampling]
max_tokens = 1024
temperature = 1.2

# V108: Blind Self-Correction THEN Oracle — best of both worlds
# Flow: score → blind self-correct (production step) → oracle correct (training step)
# Key insight: V106 proved oracle is essential for learning signal.
# V105 proved first_pass_bonus causes stubbornness. So: NO first_pass_bonus.
# The blind self-correction step is EXACTLY what we'd do at inference time.
# The oracle step provides directional learning signal during training.
# 3 examples (V104), V31 C2-heavy scales
[[orchestrator.env]]
id = "bias_detector"
name = "bias_detector"
args = { advantage_center = 0.3, gen_advantage_scale = 0.0, disc_advantage_scale = 2.0, disc_per_criterion_scales = [1.5, 2.0, 0.5], disc_num_examples = 3, disc_diverse_examples = true, disc_topic_hint = true, disc_mixed_prompt = true, disc_blind_selfcorrect = true, disc_iterative = true, use_real_articles = true, use_corpus = true, real_oversample = 10, num_seed_rows = 1000 }

[orchestrator.val]
interval = 10
num_examples = 24

[orchestrator.model.lora]
name = "r8-1e-5"

[trainer.optim]
lr = 1e-5

[trainer.model.lora]
rank = 8

[trainer.ckpt.weights]
save_adapter_separately = true

[ckpt]
interval = 25

[inference]
enable_lora = true
gpu_memory_utilization = 0.7
