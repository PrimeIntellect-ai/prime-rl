# SFT from openai/gpt-5-mini via PI inference.
# X-Prime-Team-ID header is auto-injected from $PRIME_TEAM_ID for pinference.ai URLs.
#
# Run with:
#   uv run rl @ configs/reverse_text/debug_sft_external.toml

max_steps = 20
seq_len = 2048
training_mode = "sft"

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[wandb]
project = "reverse-text-debug"
name = "debug-sft-external"

[orchestrator]
batch_size = 128
rollouts_per_example = 4
use_renderer = false

[orchestrator.train.sampling]
max_completion_tokens = 128

[[orchestrator.train.env]]
id = "reverse-text"

[orchestrator.eval]
interval = 1
num_examples = 128

[orchestrator.eval.sampling]
max_completion_tokens = 128

[[orchestrator.eval.env]]
id = "reverse-text"

[orchestrator.teacher.model]
name = "openai/gpt-5-mini"

[orchestrator.teacher.client]
base_url = ["https://api.pinference.ai/api/v1"]
api_key_var = "PRIME_API_KEY"

[trainer.optim]
lr = 3e-6

[ckpt]

[inference]
gpu_memory_utilization = 0.5
