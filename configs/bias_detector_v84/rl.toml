output_dir = "outputs/bias_detector_v84"
max_steps = 150
seq_len = 12288

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "self-play"
name = "bias-detector-v84-temp-anneal"
offline = false

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[orchestrator]
batch_size = 24
rollouts_per_example = 4
use_verifier_step_advantages = true
use_token_client = false

# V84: Temperature annealing — start hot (1.5) for exploration, cool to 0.6 for exploitation.
# All prior runs used constant T=1.2. V81 tested T=0.8 constant.
# Annealing gives best of both: diverse strategies early, focused predictions late.
# Built-in linear scheduler — no env changes needed.
[orchestrator.sampling]
max_tokens = 1024

[orchestrator.sampling.temp_scheduler]
type = "linear"
start_temperature = 1.5
end_temperature = 0.6

[[orchestrator.env]]
id = "bias_detector"
name = "bias_detector"
args = { advantage_center = 0.3, gen_advantage_scale = 0.0, disc_advantage_scale = 2.0, disc_per_criterion_scales = [1.5, 2.0, 0.5], disc_num_examples = 5, disc_diverse_examples = true, disc_topic_hint = true, disc_mixed_prompt = true, disc_iterative = true, use_real_articles = true, use_corpus = true, real_oversample = 10, num_seed_rows = 1000 }

[orchestrator.val]
interval = 10
num_examples = 24

[orchestrator.model.lora]
name = "r8-1e-5"

[trainer.optim]
lr = 1e-5

[trainer.model.lora]
rank = 8

[trainer.ckpt.weights]
save_adapter_separately = true

[ckpt]
interval = 25
