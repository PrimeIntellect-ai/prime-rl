output_dir = "outputs/bias_detector_v81"
max_steps = 150
seq_len = 12288

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "self-play"
name = "bias-detector-v81-low-temperature"
offline = false

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[orchestrator]
batch_size = 24
rollouts_per_example = 4
use_verifier_step_advantages = true
use_token_client = false

[orchestrator.sampling]
max_tokens = 1024
temperature = 0.8

# V81: Low Temperature — all prior experiments used temperature=1.2.
# Lower temperature (0.8) produces more deterministic predictions, directly
# targeting the 36% CV problem. Combined with V31's iterative correction.
# Hypothesis: T=1.2 is too high for exploitation — model samples from multiple
# conflicting scoring strategies. T=0.8 should collapse to a single consistent strategy.
[[orchestrator.env]]
id = "bias_detector"
name = "bias_detector"
args = { advantage_center = 0.3, gen_advantage_scale = 0.0, disc_advantage_scale = 2.0, disc_per_criterion_scales = [1.5, 2.0, 0.5], disc_num_examples = 5, disc_diverse_examples = true, disc_topic_hint = true, disc_mixed_prompt = true, disc_iterative = true, use_real_articles = true, use_corpus = true, real_oversample = 10, num_seed_rows = 1000 }

[orchestrator.val]
interval = 10
num_examples = 24

[orchestrator.model.lora]
name = "r8-1e-5"

[trainer.optim]
lr = 1e-5

[trainer.model.lora]
rank = 8

[trainer.ckpt.weights]
save_adapter_separately = true

[ckpt]
interval = 25

[inference]
enable_lora = true
gpu_memory_utilization = 0.7
