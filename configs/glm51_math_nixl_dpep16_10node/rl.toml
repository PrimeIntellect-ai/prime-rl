output_dir = "outputs/glm51-math-nixl-dpep16-10node-nixlfix2"
seq_len = 2048
max_steps = 500

[log]
level = "debug"

[wandb]
project = "glm51-math"
name = "glm51-math-nixl-dpep16-10node-nixlfix2"

[weight_broadcast]
type = "nixl_mx"
timeout = 12000

[deployment]
type = "multi_node"
num_train_nodes = 8
num_infer_nodes = 2
gpus_per_node = 8

[slurm]
job_name = "glm51-math-nixl-dpep16"
partition = "cluster"

[trainer]
dist_timeout_seconds = 7200

[trainer.model]
name = "zai-org/GLM-5.1"
impl = "custom"
attn = "flash_attention_2"
fused_lm_head_token_chunk_size = 2048
optim_cpu_offload = true
ep = 8

[trainer.model.compile]

[trainer.model.ac]
freq = 1

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.optim]
type = "sign_sgd"
lr = 1e-6
weight_decay = 0.1

[orchestrator]
batch_size = 64
rollouts_per_example = 16
oversampling_factor = 2
max_off_policy_steps = 8
filters = []

[orchestrator.model]
name = "zai-org/GLM-5.1-FP8"

[orchestrator.renderer]
name = "glm-5.1"

[orchestrator.train.sampling]
max_completion_tokens = 2048

[[orchestrator.train.env]]
id = "math-env"
name = "hendrycks-math"
args = { dataset_name = "PrimeIntellect/Hendrycks-Math", dataset_subset = "default", math_verify_max_workers = 128, math_verify_timeout = 60 }

[orchestrator.buffer]
easy_threshold = 1.0
hard_threshold = 0.0
seed = 42

[inference]
enable_expert_parallel = true
all2all_backend = "allgather_reducescatter"
gpu_memory_utilization = 0.80
enable_eplb = false
use_deep_gemm = true

[inference.model]
name = "zai-org/GLM-5.1-FP8"
tool_call_parser = "glm47"
max_model_len = 2048

[inference.parallel]
tp = 1
dp = 16
