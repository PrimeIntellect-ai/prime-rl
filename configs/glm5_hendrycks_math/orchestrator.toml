batch_size = 512
rollouts_per_example = 16
seq_len = 2048
max_steps = 500

[model]
name = "zai-org/GLM-5"

[sampling]
max_tokens = 2048

[[env]]
id = "primeintellect/math-env"
name = "hendrycks-math"
args = { dataset_name = "PrimeIntellect/Hendrycks-Math", dataset_subset = "default", math_verify_max_workers = 128, math_verify_timeout = 60 }

[buffer]
easy_threshold = 1.0
hard_threshold = 0.0

[val]
interval = 5
num_examples = 128

[eval]
interval = 10

[eval.sampling]
max_tokens = 2048

[[eval.env]]
id = "primeintellect/math500"
num_examples = 30
rollouts_per_example = 4

[wandb]
project = "glm5-hendrycks-math"
name = "glm5-hendrycks-math"

[ckpt]
interval = 50
