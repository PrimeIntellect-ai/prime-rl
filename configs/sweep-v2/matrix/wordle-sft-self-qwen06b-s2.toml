max_steps = 100
seq_len = 2048

[model]
name = "Qwen/Qwen3-0.6B"

[wandb]
project = "sweep-v2-full"
name = "wordle-sft-self-qwen06b-s2"

[orchestrator]
training_mode = "sft"
batch_size = 128
rollouts_per_example = 8
seed = 2

[orchestrator.renderer]
name = "qwen3"

[orchestrator.train.sampling]
max_completion_tokens = 2048
extra_body = { reasoning_effort = "minimal" }

[[orchestrator.train.env]]
id = "wordle"
args = { num_eval_examples = 100 }

[orchestrator.eval]
interval = 10
num_examples = 100

[orchestrator.eval.sampling]
max_completion_tokens = 1024

[[orchestrator.eval.env]]
id = "wordle"
args = { num_eval_examples = 100 }

[orchestrator.teacher.model]
name = "Qwen/Qwen3-0.6B"

[orchestrator.teacher.client]
base_url = ["https://api.pinference.ai/api/v1"]
api_key_var = "PRIME_API_KEY"

[orchestrator.teacher.client.headers_from_env]
X-Prime-Team-ID = "PRIME_TEAM_ID"

[trainer.optim]
lr = 3e-6

[ckpt]

[inference]
gpu_memory_utilization = 0.5