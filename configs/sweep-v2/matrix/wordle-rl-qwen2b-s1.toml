max_steps = 100
seq_len = 2048

[model]
name = "Qwen/Qwen3.5-2B"

[wandb]
project = "sweep-v2-full"
name = "wordle-rl-qwen2b-s1"

[orchestrator]
training_mode = "rl"
batch_size = 128
rollouts_per_example = 8
seed = 1

[orchestrator.renderer]
name = "qwen3"

[orchestrator.train.sampling]
max_completion_tokens = 1024

[[orchestrator.train.env]]
id = "wordle"
args = { num_eval_examples = 100 }

[orchestrator.eval]
interval = 10
num_examples = 100

[orchestrator.eval.sampling]
max_completion_tokens = 1024

[[orchestrator.eval.env]]
id = "wordle"
args = { num_eval_examples = 100 }

[trainer.optim]
lr = 3e-6

[ckpt]

[inference]
gpu_memory_utilization = 0.5