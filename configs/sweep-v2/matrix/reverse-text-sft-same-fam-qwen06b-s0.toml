max_steps = 100
seq_len = 2048

[model]
name = "Qwen/Qwen3-0.6B"

[wandb]
project = "sweep-v2-full"
name = "reverse-text-sft-same-fam-qwen06b-s0"

[orchestrator]
training_mode = "sft"
batch_size = 128
rollouts_per_example = 8

[orchestrator.renderer]
name = "qwen3"

[orchestrator.train.sampling]
max_completion_tokens = 2048
extra_body = { reasoning_effort = "minimal" }

[[orchestrator.train.env]]
id = "reverse-text"

[orchestrator.eval]
interval = 10
num_examples = 200

[orchestrator.eval.sampling]
max_completion_tokens = 256

[[orchestrator.eval.env]]
id = "reverse-text"

[orchestrator.teacher.model]
name = "qwen/qwen3-4b-instruct-2507"

[orchestrator.teacher.client]
base_url = ["https://api.pinference.ai/api/v1"]
api_key_var = "PRIME_API_KEY"

[orchestrator.teacher.client.headers_from_env]
X-Prime-Team-ID = "PRIME_TEAM_ID"

[trainer.optim]
lr = 3e-6

[ckpt]

[inference]
gpu_memory_utilization = 0.5