max_steps = 50
seq_len = 2048

[model]
name = "Qwen/Qwen3-0.6B"

[wandb]
project = "sweep-v2"
name = "alphabet-sort-rl"

[orchestrator]
training_mode = "rl"
batch_size = 128
rollouts_per_example = 8

[orchestrator.renderer]
name = "qwen3"

[orchestrator.train.sampling]
max_completion_tokens = 768

[[orchestrator.train.env]]
id = "alphabet-sort"
args = { min_turns = 2, max_turns = 3 }

[orchestrator.eval]
interval = 5
num_examples = 64

[orchestrator.eval.sampling]
max_completion_tokens = 768

[[orchestrator.eval.env]]
id = "alphabet-sort"
args = { min_turns = 2, max_turns = 3 }

[trainer.optim]
lr = 3e-6

[ckpt]

[inference]
gpu_memory_utilization = 0.5
