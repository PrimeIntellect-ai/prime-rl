output_dir = "outputs/bias_detector_v44"
max_steps = 150
seq_len = 12288

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "self-play"
name = "bias-detector-v44-c1-difficulty"
offline = false

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[orchestrator]
batch_size = 24
rollouts_per_example = 4
use_verifier_step_advantages = true
use_token_client = false

[orchestrator.sampling]
max_tokens = 1024
temperature = 1.2

# V44: C1-focused (3x) + difficulty boost (1.5x) + V28 features.
# Combines the V32 specialist approach (C1 3x) with difficulty-aware scaling.
# The hardest failure mode is C1 on subtle articles — this double-targets it.
# C1 on neutral article with max_score=0: effective weight = 3.0 * 2.5 = 7.5x
# C1 on extreme article with max_score=3: effective weight = 3.0 * 1.0 = 3.0x
[[orchestrator.env]]
id = "bias_detector"
name = "bias_detector"
args = { advantage_center = 0.3, gen_advantage_scale = 0.0, disc_advantage_scale = 2.0, disc_per_criterion_scales = [3.0, 1.0, 0.5], disc_num_examples = 5, disc_diverse_examples = true, disc_topic_hint = true, disc_mixed_prompt = true, disc_mask_quotes = 0.3, disc_difficulty_boost = 1.5, use_real_articles = true, use_corpus = true, real_oversample = 10, num_seed_rows = 1000 }

[orchestrator.val]
interval = 10
num_examples = 24

[orchestrator.model.lora]
name = "r8-1e-5"

[trainer.optim]
lr = 1e-5

[trainer.model.lora]
rank = 8

[trainer.ckpt.weights]
save_adapter_separately = true

[ckpt]
interval = 25

[inference]
enable_lora = true
gpu_memory_utilization = 0.7
