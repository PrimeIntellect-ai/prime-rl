# Inference server config for BlenderGym Phase 5/6 smokes.
# Run with: CUDA_VISIBLE_DEVICES=0 uv run inference @ configs/multimodal/inference_blendergym.toml
gpu_memory_utilization = 0.85

[model]
name = "Qwen/Qwen3.5-0.8B"
max_model_len = 16384
enforce_eager = true
trust_remote_code = true

[parallel]
tp = 1
dp = 1
