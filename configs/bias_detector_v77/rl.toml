output_dir = "outputs/bias_detector_v77"
max_steps = 150
seq_len = 12288

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "self-play"
name = "bias-detector-v77-majority-vote"
offline = false

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[orchestrator]
batch_size = 24
rollouts_per_example = 4
use_verifier_step_advantages = true
use_token_client = false

[orchestrator.sampling]
max_tokens = 1024
temperature = 1.2

# V77: Majority-Vote Consensus — run 3 independent discriminator scoring passes
# per article, take the median score for each criterion. This targets the 36% CV
# problem by reducing variance through ensembling at inference time within a single
# rollout. The model learns that consistency across passes is rewarded.
# Base recipe: V31 winning combo (iterative, diverse_examples, mixed_prompt, topic_hint).
# REQUIRES ENV CHANGE: add disc_majority_vote parameter to load_environment and
# BiasDetectorEnv. When enabled, the discriminator phase runs 3 scoring turns.
# After each turn, scores are stored. After the 3rd turn, the median per criterion
# is used as the final prediction for advantage calculation.
[[orchestrator.env]]
id = "bias_detector"
name = "bias_detector"
args = { advantage_center = 0.3, gen_advantage_scale = 0.0, disc_advantage_scale = 2.0, disc_per_criterion_scales = [2.0, 2.0, 2.0], disc_num_examples = 5, disc_diverse_examples = true, disc_topic_hint = true, disc_mixed_prompt = true, disc_iterative = true, disc_majority_vote = true, use_real_articles = true, use_corpus = true, real_oversample = 10, num_seed_rows = 1000 }

[orchestrator.val]
interval = 10
num_examples = 24

[orchestrator.model.lora]
name = "r8-1e-5"

[trainer.optim]
lr = 1e-5

[trainer.model.lora]
rank = 8

[trainer.ckpt.weights]
save_adapter_separately = true

[ckpt]
interval = 25

[inference]
enable_lora = true
gpu_memory_utilization = 0.7
