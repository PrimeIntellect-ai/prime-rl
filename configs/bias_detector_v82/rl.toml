output_dir = "outputs/bias_detector_v82"
max_steps = 150
seq_len = 12288

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "self-play"
name = "bias-detector-v82-ensemble-distill"
offline = false

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[orchestrator]
batch_size = 24
rollouts_per_example = 4
use_verifier_step_advantages = true
use_token_client = false

[orchestrator.sampling]
max_tokens = 1024
temperature = 1.2

# V82: Ensemble Distillation — after the model's first scoring pass, provide
# hints from different expert scoring perspectives (e.g., "a linguistic analyst
# would focus on...", "a political scientist would note..."). The model then
# revises its scores incorporating these diverse viewpoints.
# This targets the cross-criterion interference problem: C1 (misleading) requires
# factual analysis, C2 (bias) requires linguistic analysis, C3 (opinion) requires
# editorial judgment. Each "expert" perspective specializes in one criterion.
# REQUIRES ENV CHANGE: add disc_ensemble_distill parameter to load_environment
# and BiasDetectorEnv. When enabled, after the first disc scoring turn, inject
# expert perspective hints, then give the model a second turn to revise.
[[orchestrator.env]]
id = "bias_detector"
name = "bias_detector"
args = { advantage_center = 0.3, gen_advantage_scale = 0.0, disc_advantage_scale = 2.0, disc_per_criterion_scales = [2.0, 2.0, 2.0], disc_num_examples = 5, disc_diverse_examples = true, disc_topic_hint = true, disc_mixed_prompt = true, disc_iterative = true, disc_ensemble_distill = true, use_real_articles = true, use_corpus = true, real_oversample = 10, num_seed_rows = 1000 }

[orchestrator.val]
interval = 10
num_examples = 24

[orchestrator.model.lora]
name = "r8-1e-5"

[trainer.optim]
lr = 1e-5

[trainer.model.lora]
rank = 8

[trainer.ckpt.weights]
save_adapter_separately = true

[ckpt]
interval = 25

[inference]
enable_lora = true
gpu_memory_utilization = 0.7
