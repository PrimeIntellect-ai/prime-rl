# exp: GLM-4.5-Air (100B MoE) RL across our v1 SEARCH-domain envs — bring-your-own-search QA, run
# through the rlm harness (its built-in `search` skill) on a prime sandbox. GRPO + linear length
# penalty. 2 train + 4 infer nodes. Single run label (glm45air-search) for all envs.
#
# Mirrors configs/debug/v1/glm45air_scaleswe.toml (model/trainer/parallelism/caches): glm4_moe
# router replay, glm-4.5 renderer, cp=8 ulysses, muon, LM-head chunking, AC + activation/optimizer
# offload, skip-gather/optimizer ckpt.
#
# CAVEATS (search-specific): every env is bring-your-own-search and scored by a host-side LLM judge.
#   - The rlm `search` skill calls Serper; SERPER_API_KEY is forwarded into the sandbox via the
#     harness `forward_env`, so it must be set in the launch environment.
#   - The judges (deepdive/papersearchqa gpt-5-mini, browsecomp gpt-4.1, wideseek gpt-4.1-mini,
#     openseeker/redsearcher vf default) run host-side and need an OpenAI/PI key on the orchestrator.
# Prime runtime is forced for all envs (these are normally subprocess) under one run label.

max_steps = 1000
seq_len = 131072

# Redirect compile/JIT caches to node-local /tmp (per user + job) to avoid contended shared-FS caches.
[env_vars]
TRITON_CACHE_DIR = "/tmp/.triton-cache"

[slurm]
job_name = "glm45air-search"
partition = "all"
# Clean up this run's orphaned prime sandboxes before launch (label == SLURM job name == run label).
pre_run_command = 'timeout 120 prime sandbox delete --label "$SLURM_JOB_NAME" -y || true'

[deployment]
type = "multi_node"
num_train_nodes = 2
num_infer_nodes = 1
num_infer_replicas = 4

[wandb]
project = "search-ablations"
name = "glm45air-search"

[weight_broadcast]
type = "nccl"
timeout = 3600

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "zai-org/GLM-4.5-Air"

# --- Trainer ---

[trainer]
dist_timeout_seconds = 3600
enable_router_replay = true

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
cp = 8
cp_style = "ulysses"
fused_lm_head_token_chunk_size = 1024
optim_cpu_offload = true

[trainer.model.ac]

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.model.compile]

[trainer.ckpt]
skip_gather_master_weights = true
skip_optimizer = true

[trainer.optim]
type = "muon"

# --- Orchestrator ---

[orchestrator]
batch_size = 512
group_size = 16
max_off_policy_steps = 32
max_inflight_rollouts = 768

[orchestrator.renderer]
name = "glm-4.5"
thinking_retention = "all"

[orchestrator.algo]
type = "grpo"

[orchestrator.algo.length_penalty]
type = "linear"
num_output_tokens_weight = 0.1
num_input_tokens_weight = 0.1
num_turns_weight = 0.1

[orchestrator.prime_monitor]

# --- Train: the search envs with usable training data (rlm `search` skill, prime sandbox) ---

[[orchestrator.train.env]]
name = "deepdive"
taskset = { id = "deepdive-v1", judge = { model = "Qwen/Qwen3-235B-A22B-Instruct-2507" } } # default split qa_rl (the RL split; no held-out eval split exists)
harness = { id = "rlm", skills = ["search"], forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-search"] } }

[[orchestrator.train.env]]
name = "papersearchqa"
taskset = { id = "papersearchqa-v1", split = "train", judge = { model = "Qwen/Qwen3-235B-A22B-Instruct-2507" } }
harness = { id = "rlm", skills = ["search"], forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-search"] } }

[[orchestrator.train.env]]
name = "wideseek"
taskset = { id = "wideseek-v1", split = "hybrid", judge = { model = "Qwen/Qwen3-235B-A22B-Instruct-2507" } } # F1 reward; "hybrid" is the paper's train set
harness = { id = "rlm", skills = ["search"], forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-search"] } }

[[orchestrator.train.env]]
name = "openseeker"
taskset = { id = "openseeker-v1", judge = { model = "Qwen/Qwen3-235B-A22B-Instruct-2507" } }
harness = { id = "rlm", skills = ["search"], forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-search"] } }

[[orchestrator.train.env]]
name = "redsearcher"
taskset = { id = "redsearcher-v1", judge = { model = "Qwen/Qwen3-235B-A22B-Instruct-2507" } } # optional `difficulty` filter (easy/medium/hard)
harness = { id = "rlm", skills = ["search"], forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-search"] } }

# --- Eval: BrowseComp + PaperSearchQA held-out test, every 20 steps (incl. step 0) ---

[orchestrator.eval]
interval = 20

[[orchestrator.eval.env]]
name = "browsecomp"
num_examples = 500 # full set is 1266; cap eval at 500
taskset = { id = "browsecomp-v1", judge = { model = "Qwen/Qwen3-235B-A22B-Instruct-2507" } }
harness = { id = "rlm", skills = ["search"], forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-search"] } }
timeout = { rollout = 3600 }

[[orchestrator.eval.env]]
name = "papersearchqa-test"
num_examples = 500 # full test split is 5000; cap eval at 500
taskset = { id = "papersearchqa-v1", split = "test", judge = { model = "Qwen/Qwen3-235B-A22B-Instruct-2507" } }
harness = { id = "rlm", skills = ["search"], forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-search"] } }
timeout = { rollout = 3600 }

# --- Inference ---

[inference]
enable_return_routed_experts = true

# vLLM + FlashInfer caches on node-local /tmp.
[inference.env_vars]
VLLM_CACHE_ROOT = "/tmp/.vllm-cache"
FLASHINFER_WORKSPACE_BASE = "/tmp/.flashinfer-cache"

[inference.model]
max_model_len = 131072

[inference.parallel]
tp = 8
