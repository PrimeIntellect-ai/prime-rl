max_steps = 500

[wandb]
project = "arc-multistrategy"
name = "arc-multi-4b-lora"

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[orchestrator]
batch_size = 24
rollouts_per_example = 8

[orchestrator.sampling]
max_tokens = 4096
temperature = 1.0

[orchestrator.wandb.log_extras]
samples = true
interval = 1

[orchestrator.actor_models]
codegen_v1b = "Qwen/Qwen3-4B-Instruct-2507"
codegen_v4 = "Qwen/Qwen3-4B-Instruct-2507"
image = "Qwen/Qwen3-VL-4B-Instruct"

[[orchestrator.env]]
id = "arc-multistrategy"
name = "arc_multistrategy"

[orchestrator.env.args]
num_examples = 200
sort_by_size = true

[ckpt]
interval = 50
keep_last = 3

[trainer.model.lora]
rank = 32

[inference]
enable_lora = true

[inference.model]
max_model_len = 8192
