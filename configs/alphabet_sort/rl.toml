max_steps = 100
seq_len = 2048

[wandb]
project = "alphabet-sort-debug"
name = "alphabet-sort"


[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[orchestrator]
batch_size = 512
group_size = 16

[orchestrator.train.sampling]
max_completion_tokens = 512

[[orchestrator.train.env]]
name = "alphabet-sort"
taskset = { id = "alphabet-sort-v1", min_turns = 2, max_turns = 2 }
harness = { id = "null", runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 50

[[orchestrator.eval.env]]
name = "alphabet-sort"
num_examples = 50
group_size = 4
taskset = { id = "alphabet-sort-v1", min_turns = 2, max_turns = 2 }
harness = { id = "null", runtime = { type = "subprocess" } }

[trainer]

[inference]
