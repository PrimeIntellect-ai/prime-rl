output_dir = "/beegfs/outputs/qwen3-30b-a3b-pd-wordle-router-replay-start-audit"
clean_output_dir = true
max_steps = 3
seq_len = 4096
max_async_level = 1

[log]
level = "debug"

[model]
name = "Qwen/Qwen3-30B-A3B-Instruct-2507"

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 2
gpus_per_node = 8

[slurm]
job_name = "qwen3-pd-wordle-start-audit"
partition = "cluster"
time = "03:00:00"
exclude = "ltc-idc3-hgx8-h200-[53,88]"

[wandb]
project = "qwen3-router-replay-e2e"
name = "qwen3-30b-a3b-pd-wordle-start-audit"
group = "router-replay-e2e"
offline = true
shared = false

[weight_broadcast]
type = "nccl"
timeout = 3600

[trainer]
enable_router_replay = true
max_concurrent_runs = 1
dist_timeout_seconds = 3600

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
optim_cpu_offload = true
ep = 8

[trainer.model.ac]
mode = "full"
freq = 1

[trainer.model.ac_offloading]
max_inflight_activations = 5

[trainer.model.compile]

[trainer.optim]
type = "adamw"
lr = 1e-6

[inference]
gpu_memory_utilization = 0.9
enable_return_routed_experts = true
enable_eplb = false

[inference.parallel]
tp = 8

[inference.model]
max_model_len = 4096

[inference.deployment]
type = "disaggregated"
num_prefill_nodes = 1
num_decode_nodes = 1

[orchestrator]
filters = []
batch_size = 8
max_inflight_rollouts = 8
rollouts_per_example = 1
max_off_policy_steps = 2

[orchestrator.train.sampling]
temperature = 1.0
repetition_penalty = 1.0
max_completion_tokens = 512
min_tokens = 0

[[orchestrator.train.env]]
id = "wordle"
name = "wordle"
num_workers = 1
max_retries = 0
max_total_completion_tokens = 1024

[orchestrator.train.env.args]
num_train_examples = 8
num_eval_examples = 4

[orchestrator.train.env.extra_env_kwargs]
max_total_completion_tokens = 1024
max_seq_len = 4096

[orchestrator.student.client]
timeout = 1200
wait_for_ready_timeout = 1800

[orchestrator.renderer]
preserve_all_thinking = true

[orchestrator.buffer]
easy_threshold = 1.0
hard_threshold = 0.0
