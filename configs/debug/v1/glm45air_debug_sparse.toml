# Fast-repro debug config for the sparse_filesystem weight-broadcast deadlock.
#
# Derived from glm45air_scaleswe.toml. The trainer topology is kept IDENTICAL to the crashed run
# (2 train nodes, cp=8 ulysses, ep, custom impl, sparse_filesystem broadcast, router replay) so the
# buggy code path in src/prime_rl/trainer/rl/broadcast/sparse_filesystem.py is preserved. Everything
# that makes iteration slow is shrunk: wordle instead of the SWE taskset (no prime sandboxes, fast
# rollouts), seq_len 8k, 2 inference replicas instead of 4, a tiny batch, few steps, and no eval —
# so we reach step 0 -> first weight sync (where it hangs) in minutes.

max_steps = 10
seq_len = 8192
output_dir = "outputs-debug-sparse"

[env_vars]
TRITON_CACHE_DIR = "/tmp/triton-cache-$USER-$SLURM_JOB_ID"

[slurm]
job_name = "glm45air-debug-sparse"
project_dir = "."
partition = "all"

[deployment]
type = "multi_node"
num_train_nodes = 2
num_infer_nodes = 1
num_infer_replicas = 2

[wandb]
project = "swe-ablations"
name = "glm45air-debug-sparse"

[weight_broadcast]
type = "sparse_filesystem"

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "zai-org/GLM-4.5-Air"

# --- Trainer (identical to the crashed sparse run) ---

[trainer]
dist_timeout_seconds = 3600
enable_router_replay = true

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
cp = 8
cp_style = "ulysses"
fused_lm_head_token_chunk_size = 1024
optim_cpu_offload = true

[trainer.model.ac]

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.model.compile]

[trainer.ckpt]
skip_gather_master_weights = true
skip_optimizer = true

[trainer.optim]
type = "muon"

# --- Orchestrator: wordle, tiny batch to reach the first weight sync fast ---

[orchestrator]
batch_size = 16
group_size = 8
max_off_policy_steps = 32
max_inflight_rollouts = 64

[orchestrator.renderer]
name = "glm-4.5"
thinking_retention = "all"

[orchestrator.train.sampling]
max_completion_tokens = 1024

[[orchestrator.train.env]]
name = "wordle"
taskset = { id = "wordle-v1" }
harness = { id = "default", runtime = { type = "subprocess" } }

[orchestrator.prime_monitor]

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85
enable_prefix_caching = true
enable_return_routed_experts = true

[inference.env_vars]
VLLM_CACHE_ROOT = "/tmp/.vllm_cache_$(whoami)"
FLASHINFER_WORKSPACE_BASE = "/tmp/flashinfer-$(whoami)"

[inference.model]
max_model_len = 8192

[inference.parallel]
tp = 8
