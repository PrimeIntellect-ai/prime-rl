# Debug RL run through the explicit built-in single-agent topology.

max_steps = 20
seq_len = 2048

[wandb]
project = "reverse-text"
name = "v1"

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[orchestrator]
batch_size = 128
group_size = 16

[orchestrator.renderer]
name = "qwen3"

[orchestrator.train.sampling]
max_completion_tokens = 128

[[orchestrator.train.env]]
topology = { id = "single-agent", taskset = { id = "reverse-text-v1" }, agent = { harness = { id = "null", runtime = { type = "subprocess" } } } }

# No eval block, mirroring examples/reverse_text/rl.toml — this is a train-only
# smoke. Add an [orchestrator.eval] block (with an interval) to exercise eval.

[trainer.optim]
lr = 3e-6

[ckpt]

[inference]
gpu_memory_utilization = 0.5
