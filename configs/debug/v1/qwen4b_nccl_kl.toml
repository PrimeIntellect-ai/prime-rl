# NCCL control for qwen4b_sparse_kl.toml — identical config, but nccl weight broadcast instead of
# sparse_filesystem. If sparse's Mismatch KL drifts up while this one stays flat, the drift is a
# sparse-weight-sync correctness bug (inference weights diverging from the trainer).

max_steps = 300
seq_len = 4096
output_dir = "outputs-qwen4b-nccl"

[slurm]
job_name = "qwen4b-nccl-kl"
project_dir = "."
partition = "all"

[deployment]
type = "single_node"
num_train_gpus = 4
num_infer_gpus = 4

[wandb]
project = "swe-ablations"
name = "qwen4b-nccl-kl"

[weight_broadcast]
type = "nccl"

[model]
name = "Qwen/Qwen3-4B"

[trainer]

[trainer.model]
impl = "custom"

[trainer.optim]
type = "muon"

[orchestrator]
batch_size = 128
group_size = 8

[orchestrator.train.sampling]
max_completion_tokens = 2048

[[orchestrator.train.env]]
taskset = { id = "gsm8k-v1", split = "train" }
harness = { id = "default", runtime = { type = "subprocess" } }

[inference.parallel]
tp = 4
