# v1 RL ablation: GLM-4.5-Air (100B MoE) on the v1 `scaleswe-v1` SWE taskset, bash_edit harness on
# a prime sandbox runtime; eval on SWE-Bench Verified. Router replay is enabled
# (trainer.enable_router_replay replays the routed-expert decisions returned by inference via
# enable_return_routed_experts) — GLM-4.5-Air is a glm4_moe model, which supports routed_experts.
#
# Length-penalty variant of glm45air_scaleswe.toml: adds the linear length penalty from the
# length-penalty-context-turns branch with all three coefficients (completion tokens, non-completion
# / context tokens, turns) set to 0.1. Each term is pass_rate-scaled and normalized by the group's
# own max before the GRPO baseline subtraction.
#
# 2 train + 4 infer nodes. Trainer uses cp=8 (ulysses) plus
# the memory improvements from the GLM-5.1 prod run (research-prod rlm5/prod.toml): LM-head token
# chunking, activation checkpointing (freq=1) + activation offloading (max_inflight=1), optimizer
# CPU offload, and skip-gather / skip-optimizer checkpointing. Derived from
# configs/debug/v1/scaleswe.toml + GLM-4.5-Air model settings from the int5 opencode configs.

max_steps = 1000
seq_len = 65536

[slurm]
job_name = "glm45air-rlm-lp"
project_dir = "."
partition = "all"
# Clean up this run's orphaned prime sandboxes before launch (label == SLURM job name).
pre_run_command = 'timeout 120 prime sandbox delete --label "$SLURM_JOB_NAME" -y || true'

[deployment]
type = "multi_node"
num_train_nodes = 2
num_infer_nodes = 1
num_infer_replicas = 4

[wandb]
project = "swe-ablations"
name = "glm45air-scaleswe-rlm-lp"

[weight_broadcast]
type = "nccl"
timeout = 3600

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "zai-org/GLM-4.5-Air"

# --- Trainer ---

[trainer]
dist_timeout_seconds = 3600
enable_router_replay = true

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
cp = 8
cp_style = "ulysses"
fused_lm_head_token_chunk_size = 1024
optim_cpu_offload = true

[trainer.model.ac]

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.model.compile]

[trainer.ckpt]
skip_gather_master_weights = true
skip_optimizer = true

[trainer.optim]
type = "muon"

# --- Orchestrator ---

[orchestrator]
batch_size = 256
group_size = 16
max_off_policy_steps = 32
max_inflight_rollouts = 512

# Linear length penalty: completion-token, non-completion (context) token, and turns terms,
# all at coef 0.1. Each is pass_rate-scaled, normalized by the group's own max, and subtracted
# from each reward before the GRPO baseline.
[orchestrator.advantage]
type = "default"

[orchestrator.advantage.length_penalty]
coef = 0.1
context_coef = 0.1
turns_coef = 0.1

[orchestrator.renderer]
name = "glm-4.5"
preserve_all_thinking = true

[[orchestrator.train.env]]
name = "scaleswe"
taskset = { id = "scaleswe-v1" }
harness = { id = "rlm", runtime = { type = "prime", labels = ["glm45air-rlm-lp"] } }

[orchestrator.prime_monitor]

# --- Eval: SWE-Bench Verified at step 0 + every 20 steps, bash_edit harness on prime ---

[orchestrator.eval]
interval = 20
skip_first_step = false

[[orchestrator.eval.env]]
name = "swebench-verified"
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "rlm", runtime = { type = "prime", labels = ["glm45air-rlm-lp"] } }
timeout = { rollout = 3600 }

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85
enable_prefix_caching = true
enable_return_routed_experts = true

[inference.model]
max_model_len = 65536

[inference.parallel]
tp = 8
