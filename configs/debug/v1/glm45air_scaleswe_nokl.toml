# v1 RL ablation: GLM-4.5-Air (100B MoE) on the v1 `scaleswe-v1` SWE taskset, bash_edit harness on
# a prime sandbox runtime; eval on SWE-Bench Verified. This is the **no-KL** ablation: identical to
# glm45air_scaleswe.toml but with the KL regularizer disabled (trainer.loss.kl_tau = 0) and the
# baseline NCCL weight broadcast (no sparse filesystem sync). Router replay stays enabled.
#
# 2 train + 4 infer nodes. Trainer uses cp=8 (ulysses) plus the GLM-5.1 prod memory improvements:
# LM-head token chunking, activation checkpointing (freq=1) + activation offloading (max_inflight=1),
# optimizer CPU offload, and skip-gather / skip-optimizer checkpointing.

max_steps = 1000
seq_len = 65536
output_dir = "outputs-nokl"

# Redirect compile/JIT caches to node-local /tmp (per user + job) to avoid
# slow/contended shared-FS caches and FS lock deadlocks.
[env_vars]
TRITON_CACHE_DIR = "/tmp/triton-cache-$USER-$SLURM_JOB_ID"

[slurm]
job_name = "glm45air-swe-nokl"
project_dir = "."
partition = "all"
# Clean up this run's orphaned prime sandboxes before launch (label == SLURM job name).
pre_run_command = 'timeout 120 prime sandbox delete --label "$SLURM_JOB_NAME" -y || true'

[deployment]
type = "multi_node"
num_train_nodes = 2
num_infer_nodes = 1
num_infer_replicas = 4

[wandb]
project = "swe-ablations"
name = "glm45air-scaleswe-nokl"

[weight_broadcast]
type = "nccl"
timeout = 3600

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "zai-org/GLM-4.5-Air"

# --- Trainer ---

[trainer]
dist_timeout_seconds = 3600
enable_router_replay = true

# no-KL ablation: disable the KL regularizer term in the RL loss.
[trainer.loss]
kl_tau = 0.0

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
cp = 8
cp_style = "ulysses"
fused_lm_head_token_chunk_size = 1024
optim_cpu_offload = true

[trainer.model.ac]

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.model.compile]

[trainer.ckpt]
skip_gather_master_weights = true
skip_optimizer = true

[trainer.optim]
type = "muon"

# --- Orchestrator ---

[orchestrator]
batch_size = 256
group_size = 16
max_off_policy_steps = 32
max_inflight_rollouts = 512

[orchestrator.renderer]
name = "glm-4.5"
thinking_retention = "all"

[[orchestrator.train.env]]
name = "scaleswe"
taskset = { id = "scaleswe-v1" }
harness = { id = "bash_edit", runtime = { type = "prime", labels = ["glm45air-swe-nokl"] } }

[orchestrator.prime_monitor]

# --- Eval: SWE-Bench Verified at step 0 + every 20 steps, bash_edit harness on prime ---

[orchestrator.eval]
interval = 20
skip_first_step = false

[[orchestrator.eval.env]]
name = "swebench-verified"
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "bash_edit", runtime = { type = "prime", labels = ["glm45air-swe-nokl"] } }
timeout = { rollout = 3600 }

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85
enable_prefix_caching = true
enable_return_routed_experts = true

# vLLM + FlashInfer caches on node-local /tmp (see [env_vars]).
[inference.env_vars]
VLLM_CACHE_ROOT = "/tmp/.vllm_cache_$(whoami)"
FLASHINFER_WORKSPACE_BASE = "/tmp/flashinfer-$(whoami)"

[inference.model]
max_model_len = 65536

[inference.parallel]
tp = 8
