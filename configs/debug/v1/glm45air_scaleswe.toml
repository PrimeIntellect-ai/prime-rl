# v1 RL ablation: GLM-4.5-Air (100B MoE) on the v1 `scaleswe-v1` SWE taskset, bash harness on a
# prime sandbox runtime; eval on SWE-Bench Verified. Router replay is enabled
# (trainer.enable_router_replay replays the routed-expert decisions returned by inference via
# enable_return_routed_experts) — GLM-4.5-Air is a glm4_moe model, which supports routed_experts.
#
# 2 train + 2 infer nodes. Trainer uses cp=8 (ulysses) plus the memory improvements from the
# GLM-5.1 prod run (research-prod rlm5/prod.toml): LM-head token chunking, activation
# checkpointing (freq=1) + activation offloading, optimizer CPU offload, and skip-gather /
# skip-optimizer checkpointing. Derived from configs/debug/v1/scaleswe.toml + GLM-4.5-Air model
# settings from the int5 opencode configs.

max_steps = 400
seq_len = 65536

[slurm]
job_name = "glm45air-swe"
project_dir = "."
partition = "all"
# Clean up this run's orphaned prime sandboxes before launch (label == SLURM job name).
pre_run_command = 'timeout 120 prime sandbox delete --label "$SLURM_JOB_NAME" -y || true'

[deployment]
type = "multi_node"
num_train_nodes = 2
num_infer_nodes = 1
num_infer_replicas = 2

[wandb]
project = "swe-ablations"
name = "glm45air-scaleswe"

[weight_broadcast]
type = "nccl"
timeout = 3600

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "zai-org/GLM-4.5-Air"

# --- Trainer ---

[trainer]
dist_timeout_seconds = 3600
enable_router_replay = true

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
cp = 8
cp_style = "ulysses"
fused_lm_head_token_chunk_size = 1024
optim_cpu_offload = true

[trainer.model.ac]

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.model.compile]

[trainer.ckpt]
skip_gather_master_weights = true
skip_optimizer = true

[trainer.optim]
type = "muon"

# --- Orchestrator ---

[orchestrator]
batch_size = 256
group_size = 16
max_off_policy_steps = 32
max_inflight_rollouts = 384

[orchestrator.renderer]
name = "glm-4.5"
preserve_all_thinking = true

[[orchestrator.train.env]]
name = "scaleswe"
taskset = { id = "scaleswe-v1" }
harness = { id = "bash", runtime = { type = "prime", labels = ["glm45air-swe"] } }

[orchestrator.prime_monitor]

# --- Eval: SWE-Bench Verified every 20 steps, bash harness on prime ---

[orchestrator.eval]
interval = 20

[[orchestrator.eval.env]]
name = "swebench-verified"
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "bash", runtime = { type = "prime", labels = ["glm45air-swe"] } }
timeout = { rollout = 3600 }

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85
enable_prefix_caching = true
enable_return_routed_experts = true
vllm_extra = { quantization = "fp8" }

[inference.model]
max_model_len = 65536

[inference.parallel]
tp = 8
