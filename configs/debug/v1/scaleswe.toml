# v1 RL run: Qwen3.6-35B-A3B (MoE) on the v1 `scaleswe-v1` SWE taskset, rlm harness on a modal
# runtime. Each scaleswe row ships its own Docker image (NEEDS_CONTAINER) which the Environment
# injects into the modal sandbox; the agent edits the repo + runs tests there (no MCP toolset).
#
# Built from configs/debug/v1/r2e_gym.toml (the v1 SWE structure) + the MoE parallelism from
# configs/general_agent/rl_qwen3_30b_a3b.toml. The deployment/parallelism is a starting point off
# the 30B-A3B reference — confirm/adjust for your cluster and the 35B / 65k-context footprint.

max_steps = 400
seq_len = 65536

[slurm]
job_name = "scaleswe-qwen36-35b-a3b"
project_dir = "."

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 1

[wandb]
project = "scaleswe-debug"
name = "qwen36-35b-a3b"

[weight_broadcast]
type = "nccl"

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "Qwen/Qwen3.6-35B-A3B"

# --- Trainer ---

[trainer]

[trainer.model]
cp = 2

[trainer.model.ac]
freq = 1

[trainer.model.compile]

# --- Orchestrator ---

[orchestrator]
batch_size = 256
group_size = 16
max_off_policy_steps = 16

[orchestrator.renderer]
name = "qwen3.6"
enable_thinking = true

[orchestrator.train.sampling]
temperature = 1.0

[[orchestrator.train.env]]
name = "scaleswe"
# v1 scaleswe SWE taskset; rlm agent in a modal sandbox using the row's injected Docker image.
taskset = { id = "scaleswe-v1" }
harness = { id = "rlm", runtime = { type = "modal" } }

[orchestrator.prime_monitor]

# --- Eval: SWE-Bench Verified every 20 steps (like the v0 rlm_swe run), on the prime runtime ---

[orchestrator.eval]
interval = 20

[[orchestrator.eval.env]]
name = "swebench-verified"
# SWE-bench Verified via the harbor swebench-verified-v1 taskset; rlm agent on the prime runtime,
# pulling prime's prebuilt instance images (use_prime_registry needs GCP-cred prime sandboxes).
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "rlm", runtime = { type = "prime", labels = ["scaleswe-qwen36-35b-a3b"] } }
timeout = { rollout = 3600 }

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85
enable_prefix_caching = true

[inference.model]
max_model_len = 65536

[inference.parallel]
dp = 2
tp = 4
