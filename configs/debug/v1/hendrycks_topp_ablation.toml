# hendrycks sanity v1 with truncated train sampling (top_p 0.97 / top_k 512) —
# sampling replay ablation. Derived from hendrycks_sanity.toml with
# the modal runtime swapped for subprocess (no Modal creds on this box) and a
# local output dir.

output_dir = "outputs/hendrycks-topp-ablation"
max_steps = 200

[deployment]
num_train_gpus = 4
num_infer_gpus = 4

[slurm]
job_name = "hendrycks-topp"
partition = "prod"

[model]
name = "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"

[orchestrator]
batch_size = 512
group_size = 8
seq_len = 8192
max_inflight_rollouts = 256

[orchestrator.train.sampling]
top_p = 0.97
top_k = 512

[[orchestrator.train.env]]
name = "hendrycks-math"
taskset = { id = "math-env-v1", dataset_name = "mikasenghaas/Sanity-Test-R1D-1.5B", dataset_subset = "default" }
harness = { id = "null", runtime = { type = "subprocess" } }
timeout = { scoring = 300 }

[orchestrator.eval]
interval = 50

[[orchestrator.eval.env]]
name = "aime2024"
taskset = { id = "aime24-v1" }
harness = { id = "null", runtime = { type = "subprocess" } }
timeout = { scoring = 300 }
group_size = 32

[trainer.model]
seq_len = 16384

[inference.model]
max_model_len = 8192

# Model not in MODEL_RENDERER_MAP — opt into DefaultRenderer (apply_chat_template).
[orchestrator.renderer]
name = "default"
reasoning_parser = "think"
