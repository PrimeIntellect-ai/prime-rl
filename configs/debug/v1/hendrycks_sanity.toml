# v1 analog of examples/hendrycks_sanity/rl.toml — identical config with only
# the env sections swapped to v1 taskset/harness syntax (math-env taskset,
# default harness, modal runtime). Submits to slurm by default; pass --no-slurm
# to run locally.

output_dir = "/beegfs/mika/hendrycks-sanity-v1"
max_steps = 200

[wandb]
project = "hendrycks-sanity"
name = "v1"

[deployment]
num_train_gpus = 6
num_infer_gpus = 2

[slurm]
job_name = "hendrycks-v1"
partition = "all"

# Keep uv's cache + prepared env-script interpreters node-local (off shared NFS).
# Injected into every component; the subprocess runtime inherits these into each
# scoring process. (Model/hub weights stay on the shared HF cache — not relocated.)
[env_vars]
UV_CACHE_DIR = "/tmp/uv-cache"
UV_PYTHON_INSTALL_DIR = "/tmp/uv-python"
XDG_CACHE_HOME = "/tmp/xdg"

[model]
name = "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"

[orchestrator]
batch_size = 512
group_size = 8
seq_len = 8192

# Hard ceiling on in-flight rollouts. Without it the KV-based controller ramps
# unbounded on a small model (KV never nears target) and overwhelmed the runtime.
[orchestrator.concurrency]
max_inflight_rollouts = 1024
initial_inflight_rollouts = 64

[[orchestrator.train.env]]
name = "hendrycks-math"
taskset = { id = "math-env-v1", dataset_name = "mikasenghaas/Sanity-Test-R1D-1.5B", dataset_subset = "default" }
harness = { id = "default", runtime = { type = "subprocess" } }
timeout = { scoring = 300 }

[orchestrator.eval]
interval = 50

[[orchestrator.eval.env]]
name = "aime2024"
taskset = { id = "aime24-v1" }
harness = { id = "default", runtime = { type = "subprocess" } }
timeout = { scoring = 300 }
group_size = 32

[trainer.model]
seq_len = 16384

[inference.model]
max_model_len = 8192

# Model not in MODEL_RENDERER_MAP — opt into DefaultRenderer (apply_chat_template).
[orchestrator.renderer]
name = "default"
reasoning_parser = "think"
