# OPD with a locally-launched teacher (3 GPUs).
#
# The rl entrypoint brings up *both* inference deployments here — no need to
# run a separate `uv run inference` for the teacher. GPU placement is
# sequential across the [[inference]] list, then trainer:
#   GPU 0: student vLLM (PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT)
#   GPU 1: teacher vLLM (PrimeIntellect/Qwen3-0.6B-Reverse-Text-RL)
#   GPU 2: trainer
#
# orchestrator.teacher.{client.base_url,model.name} are auto-wired from the
# [[inference]] tag="teacher" entry by `auto_setup_inference_clients`.
#
# Run:
#   uv run rl @ configs/debug/multi_inference/opd_local_teacher.toml

max_steps = 20
seq_len = 2048

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[wandb]
project = "reverse-text-debug"
name = "debug-opd-local-teacher"

[orchestrator]
training_mode = "opd"
batch_size = 128
rollouts_per_example = 16

[orchestrator.renderer]
name = "qwen3"

[orchestrator.train.sampling]
max_completion_tokens = 128

[[orchestrator.train.env]]
id = "reverse-text"

[orchestrator.eval]
interval = 1
num_examples = 128

[orchestrator.eval.sampling]
max_completion_tokens = 128

[[orchestrator.eval.env]]
id = "reverse-text"

[trainer.optim]
lr = 3e-6

[deployment]
gpus_per_node = 3
num_train_gpus = 1
num_infer_gpus = 1

[[inference]]
tag = "student"
gpu_memory_utilization = 0.5
[inference.server]
port = 8000

[[inference]]
tag = "teacher"
gpu_memory_utilization = 0.5
[inference.model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-RL"
[inference.server]
port = 8001
