# Debug RL run on the vf-nano env server (reverse-text starter).
# The orchestrator spawns a vf-nano EnvServer per env (it never loads the env
# itself), dispatches rollouts by task index, and trains on the returned Traces
# (renderer-tokenized). Light settings for a quick end-to-end smoke.

max_steps = 20
seq_len = 2048

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[orchestrator]
training_mode = "rl"
batch_size = 128
group_size = 16

[orchestrator.renderer]
name = "qwen3"

[orchestrator.train.sampling]
max_completion_tokens = 128

[[orchestrator.train.env]]
id = "reverse-text"
# Swappable agent/runtime inherited from vf-nano. reverse-text is a pure-text
# single-turn env, so the subprocess runtime (no docker) is enough.
agent = { type = "default", runtime = { type = "subprocess" } }

# No eval block, mirroring examples/reverse_text/rl.toml — this is a train-only
# smoke. Add an [orchestrator.eval] block (with an interval) to exercise eval.

[trainer.optim]
lr = 3e-6

[ckpt]

[inference]
gpu_memory_utilization = 0.5

# vf-nano's default agent always offers a `bash` tool, so vLLM must accept
# tool requests. This fine-tune doesn't auto-resolve a parser, so set it
# (Qwen3 uses the hermes tool-call format).
[inference.model]
tool_call_parser = "hermes"
