# Hendrycks-math sanity RL run on the vf-nano env server (vf-nano analog of
# configs/debug/hendrycks_sanity). The orchestrator spawns a vf-nano EnvServer for the
# math-env taskset, dispatches rollouts by task index, and trains on the returned Traces.
# The model reasons (<think>) and boxes its answer; math-env scores it with math-verify.

max_steps = 3000
seq_len = 4096

[model]
name = "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"

[orchestrator]
training_mode = "rl"
batch_size = 256
max_inflight_rollouts = 512
group_size = 8

# Model not in MODEL_RENDERER_MAP — opt into DefaultRenderer (apply_chat_template) and
# parse the R1-distill <think> reasoning.
[orchestrator.renderer]
name = "default"
reasoning_parser = "think"

[[orchestrator.train.env]]
name = "hendrycks-math"
taskset = { id = "math-env", dataset_name = "mikasenghaas/Sanity-Test-R1D-1.5B", dataset_subset = "default" }
# Single-turn math: disable the bash tool (the model answers directly) and use the
# subprocess runtime (the math-verify reward runs as a uv script there, no docker).
harness = { id = "default", enable_bash = false, runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 50

[[orchestrator.eval.env]]
name = "aime2024"
taskset = { id = "aime24" }
harness = { id = "default", enable_bash = false, runtime = { type = "subprocess" } }
group_size = 16

[trainer.model.ac]

[trainer.model.compile]

[ckpt]

[inference.model]
max_model_len = 4096

[log]
level = "debug"
