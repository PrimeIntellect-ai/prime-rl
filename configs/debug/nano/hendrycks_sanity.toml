# vf-nano analog of examples/hendrycks_sanity/rl.toml — identical config with only
# the env sections swapped to vf-nano taskset/harness syntax (math-env taskset,
# default harness, subprocess runtime). Submits to slurm by default; pass --no-slurm
# to run locally.

max_steps = 5000

[wandb]
project = "hendrycks-sanity"
name = "vf-nano-subprocess"

[deployment]
num_train_gpus = 4
num_infer_gpus = 4

[slurm]
job_name = "vf-nano-subprocess"
partition = "cluster"

[model]
name = "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"

[orchestrator]
batch_size = 512
group_size = 8
seq_len = 8192

[[orchestrator.train.env]]
name = "hendrycks-math"
taskset = { id = "math-env", dataset_name = "mikasenghaas/Sanity-Test-R1D-1.5B", dataset_subset = "default" }
harness = { id = "default", enable_bash = false, runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 50

[[orchestrator.eval.env]]
name = "aime2024"
taskset = { id = "aime24" }
harness = { id = "default", enable_bash = false, runtime = { type = "subprocess" } }
group_size = 32

[trainer.model]
seq_len = 16384

[inference.model]
max_model_len = 8192

# Model not in MODEL_RENDERER_MAP — opt into DefaultRenderer (apply_chat_template).
[orchestrator.renderer]
name = "default"
reasoning_parser = "think"
