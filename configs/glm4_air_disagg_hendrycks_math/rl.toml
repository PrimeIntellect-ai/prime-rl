seq_len = 2048
output_dir = "/data/outputs/glm4-air-disagg-hendrycks-math"

[log]
level = "debug"

[wandb]
project = "glm4-air-disagg"
name = "glm4-air-disagg-hendrycks-math"

[model]
name = "zai-org/GLM-4.5-Air"

[weight_broadcast]
type = "nccl"

[deployment]
type = "multi_node"
num_train_nodes = 4
num_infer_nodes = 3
gpus_per_node = 8

[slurm]
job_name = "glm4-air-disagg"
project_dir = "."
partition = "cluster"

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
optim_cpu_offload = true
ep = 8

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.model.ac]
freq = 1

[trainer.optim]
type = "adamw"
lr = 1e-6

[inference]
gpu_memory_utilization = 0.9
enable_eplb = false

[inference.deployment]
type = "disaggregated"
num_prefill_nodes = 1
num_decode_nodes = 2

[orchestrator]
use_token_client = false
batch_size = 512
rollouts_per_example = 8
oversampling_factor = 4

[orchestrator.sampling]
max_tokens = 2048

[orchestrator.wandb.log_extras]
samples = true
interval = 1

[[orchestrator.env]]
id = "math-env"
name = "hendrycks-math"
args = { dataset_name = "PrimeIntellect/Hendrycks-Math", dataset_subset = "default", math_verify_max_workers = 128, math_verify_timeout = 60 }

[orchestrator.buffer]
easy_threshold = 1.0
hard_threshold = 0.0
seed = 42
