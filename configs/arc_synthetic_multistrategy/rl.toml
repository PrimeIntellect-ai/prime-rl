max_steps = 500

[wandb]
project = "arc-synthetic-multistrategy"
name = "arc-synth-4b-lora-l1-v2"

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[orchestrator]
batch_size = 256
rollouts_per_example = 8

[orchestrator.sampling]
max_tokens = 12288
temperature = 1.0

[orchestrator.wandb.log_extras]
samples = true
interval = 1

[[orchestrator.env]]
id = "arc-synthetic-multistrategy"
name = "arc_synthetic_multistrategy"

[orchestrator.env.args]
num_examples = 260
sort_by_size = true
levels = [1]
task_types = []

[ckpt]
interval = 10
keep_last = 3

[trainer.model]
seq_len = 16384
optimization_dtype = "bfloat16"

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-4

[trainer.model.lora]
rank = 32

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[inference]
enable_lora = true

[inference.model]
max_model_len = 16384
