# GPT-5.5 RLM discovery eval: 10 tasks per tier, 5 rollouts each.
# 10 tasks per tier, 5 rollouts each, selected by GLM-5.1 RLM pass@50 quantiles.
model = "openai/gpt-5.5"
api_base_url = "https://api.pinference.ai/api/v1"
api_key_var = "PRIME_API_KEY"

max_tokens = 32768
max_concurrent = 50
max_retries = 1
output_dir = "/beegfs/outputs/general-agent-rlm-gpt55-discovery"
independent_scoring = true
save_results = true
state_columns = ["trajectory"]
verbose = true

[[eval]]
id = "general-agent-solver-rlm"
name = "rlm-gpt55-discovery-chess_tournament_t1"
num_examples = 1
rollouts_per_example = 5
env_args = { task = "chess_tournament_t1", local_checkout = "~/rlm", labels = ["gpt55-discovery", "t0"] }

