output_dir = "/beegfs/outputs/general-agent-qwen3-4b"
max_steps = 1000
seq_len = 32768

[slurm]
job_name = "general-agent-qwen3-4b"
project_dir = "."
pre_run_command = "srun bash -c 'pkill -9 -f torchrun; pkill -9 -f vllm; true'"

[deployment]
num_train_gpus = 4
num_infer_gpus = 4

[log]
level = "debug"

[wandb]
project = "general-agent"
name = "qwen3-4b-local"

[weight_broadcast]
type = "nccl"

[ckpt]
interval = 100
keep_last = 1
resume_step = -1

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

# --- Trainer ---

[trainer]

[trainer.model]
cp = 2

[trainer.model.ac]
freq = 1

[trainer.model.compile]

# --- Orchestrator ---

[orchestrator]
batch_size = 512
rollouts_per_example = 8

[[orchestrator.train.env]]
id = "general-agent-solver-local"
num_workers = 4
max_retries = 5

[orchestrator.prime_monitor]

[orchestrator.eval]
interval = 20

[orchestrator.eval.sampling]
max_completion_tokens = 8192

[[orchestrator.eval.env]]
id = "bfcl-v3"
rollouts_per_example = 1

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85

[inference.model]
max_model_len = 32768
tool_call_parser = "hermes"

[inference.parallel]
dp = 4
