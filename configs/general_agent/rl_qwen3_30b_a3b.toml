output_dir = "/beegfs/outputs/general-agent-qwen3-30b-a3b"
max_steps = 1000
seq_len = 32768

[slurm]
job_name = "general-agent-qwen3-30b-a3b"
project_dir = "."
pre_run_command = "srun bash -c 'pkill -9 -f torchrun; pkill -9 -f vllm; true'"

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 1

[log]
level = "debug"

[wandb]
project = "general-agent"
name = "qwen3-30b-a3b-local"

[weight_broadcast]
type = "nccl"

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "Qwen/Qwen3-30B-A3B-Instruct-2507"

# --- Trainer ---

[trainer]

[trainer.model]
cp = 2

[trainer.model.ac]
freq = 1

[trainer.model.compile]

# --- Orchestrator ---

[orchestrator]
batch_size = 512
rollouts_per_example = 16
max_off_policy_steps = 32

[[orchestrator.train.env]]
id = "general-agent-solver-local"
args = { min_tier = 1 }
num_workers = 8
max_retries = 5

[orchestrator.prime_monitor]

[orchestrator.eval]
interval = 20

[orchestrator.eval.sampling]
max_completion_tokens = 8192

[[orchestrator.eval.env]]
id = "bfcl-v3"
rollouts_per_example = 1

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85

[inference.model]
max_model_len = 32768
tool_call_parser = "hermes"

[inference.parallel]
dp = 2
tp = 4
