output_dir = "/beegfs/mika/sft-debug-qwen3-0p6b-nemotron-tok"
max_steps = 20
loss_impl = "liger_fused"

[slurm]
job_name = "sft-debug-qwen3-0p6b-nemotron-tok"
partition = "cluster"

[deployment]
type = "single_node"
gpus_per_node = 8

[optim]
type = "adamw"
lr = 5e-5
weight_decay = 0.01

[scheduler]
type = "linear"
warmup = 5

[model]
name = "PrimeIntellect/Qwen3-0.6B"

[tokenizer]
name = "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16"

[data]
type = "sft"
name = "PrimeIntellect/INTELLECT-5-SFT-Raw"
subsets = ["general_agent"]
splits = ["train"]
seq_len = 8192
batch_size = 8
seed = 42

[wandb]
project = "general-agent"
name = "sft-qwen3-0p6b-debug"

[log]
level = "debug"

[ckpt]
interval = 100
weights_only = true
