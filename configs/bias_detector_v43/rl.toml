output_dir = "outputs/bias_detector_v43"
max_steps = 150
seq_len = 12288

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "self-play"
name = "bias-detector-v43-difficulty-boost"
offline = false

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[orchestrator]
batch_size = 24
rollouts_per_example = 4
use_verifier_step_advantages = true
use_token_client = false

[orchestrator.sampling]
max_tokens = 1024
temperature = 1.2

# V43: Same as V28 (best) but with difficulty-aware advantage scaling.
# Subtle articles (max_score ≤ 1) get 2.5x advantage vs extreme articles (1.0x).
# This focuses learning on the hardest cases: neutral articles about politically
# charged topics, counter-intuitive score profiles, etc.
# Formula: scale = 1.0 + 1.5 * (3 - max(|C1|,|C2|,|C3|)) / 3
#   max_score=3: scale=1.0  |  max_score=2: scale=1.5  |  max_score=1: scale=2.0  |  max_score=0: scale=2.5
[[orchestrator.env]]
id = "bias_detector"
name = "bias_detector"
args = { advantage_center = 0.3, gen_advantage_scale = 0.0, disc_advantage_scale = 2.0, disc_per_criterion_scales = [1.5, 2.0, 0.5], disc_num_examples = 5, disc_diverse_examples = true, disc_topic_hint = true, disc_mixed_prompt = true, disc_mask_quotes = 0.3, disc_difficulty_boost = 1.5, use_real_articles = true, use_corpus = true, real_oversample = 10, num_seed_rows = 1000 }

[orchestrator.val]
interval = 10
num_examples = 24

[orchestrator.model.lora]
name = "r8-1e-5"

[trainer.optim]
lr = 1e-5

[trainer.model.lora]
rank = 8

[trainer.ckpt.weights]
save_adapter_separately = true

[ckpt]
interval = 25

[inference]
enable_lora = true
gpu_memory_utilization = 0.7
