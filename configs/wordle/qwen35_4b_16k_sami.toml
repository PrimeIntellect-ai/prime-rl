output_dir = "/beegfs/sami/outputs/wordle-qwen35-4b-16k-local-bs64-2nodes-cp1-fp32-lr1e7-inflight16"
max_steps = 400
seq_len = 16384

[slurm]
job_name = "wordle-qwen35-4b-16k-bs64-lowkl"
project_dir = "."

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 1
num_infer_replicas = 1

[wandb]
project = "wordle"
name = "qwen35-4b-16k-local-bs64-2nodes-cp1-fp32-lr1e7-inflight16-sami"

[weight_broadcast]
type = "nccl"

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "Qwen/Qwen3.5-4B"

# --- Trainer ---

[trainer]

[trainer.model]
cp = 1
cp_style = "ulysses"
fused_lm_head_token_chunk_size = "auto"

[trainer.model.ac]
freq = 1

[trainer.model.compile]

[trainer.optim]
lr = 1e-7

# --- Orchestrator ---

[orchestrator]
batch_size = 64
group_size = 16
max_inflight_rollouts = 16
max_off_policy_steps = 0

# Thinking enabled for the Qwen3.5 renderer.
[orchestrator.renderer]
name = "qwen3.5"
enable_thinking = true

[orchestrator.train.sampling]
max_completion_tokens = 1024
temperature = 1.0

[[orchestrator.train.env]]
id = "wordle"
name = "wordle"

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85
enable_prefix_caching = true
enable_fp32_lm_head = true

[inference.model]
max_model_len = 16384

[inference.parallel]
dp = 8

# Qwen3.5-4B is a VL model; skip the vision tower for text-only Wordle.
# `language_model_only` is a vLLM MultiModalConfig arg (no prime-rl field), passed through vllm_extra.
[inference.vllm_extra]
language_model_only = true
