output_dir = "outputs/bias_detector_v79"
max_steps = 200
seq_len = 12288

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "self-play"
name = "bias-detector-v79-dynamic-curriculum"
offline = false

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[orchestrator]
batch_size = 24
rollouts_per_example = 4
use_verifier_step_advantages = true
use_token_client = false

[orchestrator.sampling]
max_tokens = 1024
temperature = 1.2

# V79: Dynamic Curriculum — start with easy examples (low deviation from dataset
# mean), progressively add harder ones. disc_curriculum sorts the article pool by
# Manhattan distance from (mean_c1, mean_c2, mean_c3), so early training steps
# see near-mean articles and later steps see outliers. Combined with iterative
# correction and diverse examples for the full V31 recipe.
# Hypothesis: early training on easy examples builds a stable baseline that
# prevents catastrophic oscillation when hard examples are introduced later.
# 200 steps to give the curriculum time to work through the full difficulty range.
[[orchestrator.env]]
id = "bias_detector"
name = "bias_detector"
args = { advantage_center = 0.3, gen_advantage_scale = 0.0, disc_advantage_scale = 2.0, disc_per_criterion_scales = [2.0, 2.0, 2.0], disc_num_examples = 5, disc_diverse_examples = true, disc_topic_hint = true, disc_mixed_prompt = true, disc_iterative = true, disc_curriculum = true, use_real_articles = true, use_corpus = true, real_oversample = 10, num_seed_rows = 1000 }

[orchestrator.val]
interval = 10
num_examples = 24

[orchestrator.model.lora]
name = "r8-1e-5"

[trainer.optim]
lr = 1e-5

[trainer.model.lora]
rank = 8

[trainer.ckpt.weights]
save_adapter_separately = true

[ckpt]
interval = 25

[inference]
enable_lora = true
gpu_memory_utilization = 0.7
