# A1 — compaction baseline: compacting harness @16k, no TTT.
# The direct baseline every TTT arm is read against.

output_dir = "outputs/ttt-scaleswe/a1-compaction"

[slurm]
job_name = "glm45air-ttt-swe-a1"

[wandb]
name = "a1-glm45air-scaleswe-compact16k"

[[orchestrator.train.env]]
name = "scaleswe"
taskset = { id = "scaleswe-v1", dataset_name = "AweAI-Team/Scale-SWE", dataset_revision = "d8db20390a936bbda9c96d88b97cc4778dff1481", filter_unavailable_images = false, use_prime_registry = true }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe-a1"] } }

[[orchestrator.eval.env]]
name = "swebench-verified"
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe-a1"] } }
num_examples = 200
timeout = { rollout = 3600 }

[[orchestrator.eval.env]]
name = "swebench-pro"
taskset = { id = "swebench-pro-v1" }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe-a1"] } }
num_examples = 100
interval = 40
timeout = { rollout = 3600 }

[[orchestrator.eval.env]]
name = "deepdive"
taskset = { id = "deepdive-v1" }
harness = { id = "compacting", compact_at_tokens = 16384, search = true, forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-ttt-swe-a1"] } }
num_examples = 50
timeout = { rollout = 3600 }
