# TTT RL experiments on scaleswe-v1: GLM-4.5-Air, compacting harness on prime sandboxes,
# eval on SWE-Bench Verified (same harness/TTT regime as training). Derived from the
# glm45air-swe ablation config; adapted for TTT (compaction + LoRA serving + TTT service).
#
# ARMS (see docs/ttt.md):
#   A0 pure RL, no compaction, 64k ......... arm_a0_no_compaction.toml (overlay)
#   A1 compaction baseline (no TTT) ........ arm_a1_compaction.toml
#   A2 compaction + TTT (raw branch) ....... arm_a2_ttt.toml
#   A3 + QA (adapter trains on QA pairs) ... arm_a3_qa.toml
#   A4 = A3 + naive recycle_to_policy ...... arm_a4_recycle.toml
#   A5 = A3 + group meta-lessons ........... arm_a5_meta.toml
# Launch (baselines):  uv run rl @ .../base.toml @ .../arm_a<0|1>_*.toml
# Launch (TTT arms):   uv run rl @ .../base.toml @ .../ttt_common.toml @ .../arm_a<2-5>_*.toml
#
# ttt_common.toml holds the shared launcher-managed [ttt] service overlay (one extra SLURM
# node, layout: inference | train | ttt; ttt_service.toml remains for standalone runs).

max_steps = 1000
seq_len = 65536

[env_vars]
TRITON_CACHE_DIR = "/tmp/triton-cache-$USER-$SLURM_JOB_ID"

[slurm]
project_dir = "."
partition = "all"
pre_run_command = 'timeout 120 prime sandbox delete --label "$SLURM_JOB_NAME" -y || true'

[deployment]
type = "multi_node"
num_train_nodes = 2
num_infer_nodes = 1
num_infer_replicas = 4

[wandb]
project = "ttt-swe"

[weight_broadcast]
type = "nccl"
timeout = 3600

[ckpt]
interval = 50
keep_last = 1
# Runs start from scratch. Opt into resume explicitly with --ckpt.resume-step only after
# verifying that the selected arm's own output directory is the intended checkpoint source.

[model]
name = "zai-org/GLM-4.5-Air"

# --- Trainer ---

[trainer]
dist_timeout_seconds = 3600
enable_router_replay = true

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
cp = 8
cp_style = "ulysses"
fused_lm_head_token_chunk_size = 1024
optim_cpu_offload = true

[trainer.model.ac]

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.model.compile]

[trainer.ckpt]
skip_gather_master_weights = true
skip_optimizer = true

[trainer.optim]
type = "muon"

# --- Orchestrator ---

[orchestrator]
batch_size = 256
group_size = 16
max_off_policy_steps = 32
# TTT arms: every in-flight rollout holds a vLLM adapter slot + a TTT service slot; keep
# inflight <= [inference].max_loras and <= the service's [engine].max_slots.
max_inflight_rollouts = 256

[orchestrator.renderer]
name = "glm-4.5"
thinking_retention = "all"

[orchestrator.prime_monitor]

# --- Evals (arm overlays define the env blocks; all run the arm's own compaction+TTT
# regime; TTT eval envs route through the renderer client, eval adapters/checkpoints
# dismissed per rollout — no RL replay on eval). Three-eval panel per arm:
#   swebench-verified (200 @ every 20) . primary in-domain score
#   swebench-pro      (100 @ every 40) . within-domain generalization (different SWE
#                                        dataset — separates improvement from Scale-SWE
#                                        distribution overfit)
#   deepdive          (50  @ every 20) . out-of-domain transfer (web research, highest
#                                        context pressure; forgetting canary for A4/A5's
#                                        permanent weight updates). Needs SERPER_API_KEY
#                                        + OPENAI_API_KEY on the orchestrator. ---
# num_examples are fixed subsets: comparable across steps/arms, keeps 6-arm eval load sane.
# qa recycle/meta flags are inert on eval (train-sink only) — kept identical to training.

[orchestrator.eval]
interval = 20

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85
enable_prefix_caching = true
enable_return_routed_experts = true
# TTT: serve per-rollout LoRA adapters. Attention-only adapters (vLLM LoRA does not cover
# MoE expert FFNs); rank must cover the TTT service's [lora].rank.
enable_lora = true
max_lora_rank = 16
# Serving ceiling with a small operational margin above the dispatcher's shared
# train/eval max_inflight_rollouts (256); it does not raise rollout admission.
max_loras = 272
# vLLM requires max_cpu_loras >= max_loras (its default is 100).
max_cpu_loras = 272

[inference.env_vars]
VLLM_CACHE_ROOT = "/tmp/.vllm_cache_$(whoami)"
FLASHINFER_WORKSPACE_BASE = "/tmp/flashinfer-$(whoami)"

[inference.model]
max_model_len = 65536

[inference.parallel]
tp = 8
