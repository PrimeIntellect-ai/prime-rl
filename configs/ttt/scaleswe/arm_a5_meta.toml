# A5 — A3 + group meta-lessons: after each GRPO group, contrastive general lessons
# (success vs failure attempts) are extracted and train the POLICY's main weights (ce).
# Head-to-head vs A4 (naive recycling) — never combine the two.

[wandb]
name = "a5-glm45air-scaleswe-ttt-qa-meta"

# Launcher-managed TTT service: one extra node appended after the trainer nodes, torchrun
# across its 8 GPUs, auto-wired (output_dir, model, vLLM admin roots, env base_urls — the
# "auto" placeholders below are overwritten at job start).
[deployment]
num_ttt_nodes = 1

[ttt.engine]
type = "fsdp"
max_slots = 256                 # >= orchestrator.max_inflight_rollouts
max_tokens_per_forward = 65536
max_batch_wait_seconds = 0.5

[ttt.engine.model]
impl = "custom"
attn = "flash_attention_3"
fused_lm_head_token_chunk_size = 1024

[ttt.lora]
rank = 16
alpha = 32
# Attention-only: vLLM's LoRA serving does not cover MoE expert FFNs.
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]

[ttt.optim]
type = "adamw"
lr = 1e-4

[[orchestrator.train.env]]
name = "scaleswe"
taskset = { id = "scaleswe-v1" }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe"] } }
ttt = { base_url = "auto", qa = { meta_lessons = true } }

# Evals run the same TTT regime as training — the dispatcher routes TTT eval envs
# through the renderer (train) client, and eval adapters/checkpoints are dismissed as
# each rollout finishes (no RL replay on eval).
[[orchestrator.eval.env]]
name = "swebench-verified"
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe"] } }
ttt = { base_url = "auto", qa = { meta_lessons = true } }  # recycle/meta flags are inert on eval (consumed only by the train sink) — kept identical to training on purpose
num_examples = 200  # fixed subset: comparable across steps/arms, keeps 6-arm eval load sane
timeout = { rollout = 3600 }

# Within-domain generalization: a DIFFERENT SWE dataset (SWE-bench Pro, SWEAP images —
# no overlap with Scale-SWE). Same regime as training. Heavier tasks -> every 40 steps.
[[orchestrator.eval.env]]
name = "swebench-pro"
taskset = { id = "swebench-pro-v1" }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe"] } }
ttt = { base_url = "auto", qa = { meta_lessons = true } }  # qa flags inert on eval (train-sink only); kept identical to training
num_examples = 100
interval = 40
timeout = { rollout = 3600 }

# Out-of-domain: deepdive (long-horizon web research) — does the method transfer beyond
# SWE, and does compaction/TTT help where context pressure is highest? Needs
# SERPER_API_KEY (search tool, forwarded from the orchestrator env) and OPENAI_API_KEY
# (the taskset's gpt-5-mini judge) on the orchestrator node.
[[orchestrator.eval.env]]
name = "deepdive"
taskset = { id = "deepdive-v1" }
harness = { id = "compacting", compact_at_tokens = 16384, search = true, forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-ttt-swe"] } }
ttt = { base_url = "auto", qa = { meta_lessons = true } }  # qa flags inert on eval (train-sink only); kept identical to training
num_examples = 50
timeout = { rollout = 3600 }
