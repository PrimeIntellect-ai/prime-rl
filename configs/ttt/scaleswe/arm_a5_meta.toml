# A5 — A3 + group meta-lessons: after each GRPO group, contrastive general lessons
# (success vs failure attempts) are extracted and train the POLICY's main weights (ce).
# Head-to-head vs A4 (naive recycling) — never combine the two.
# Compose with ttt_common.toml (shared [ttt] service overlay).

output_dir = "outputs/ttt-scaleswe/a5-meta"

[slurm]
job_name = "glm45air-ttt-swe-a5"

[wandb]
name = "a5-glm45air-scaleswe-ttt-qa-meta"

[[orchestrator.train.env]]
name = "scaleswe"
taskset = { id = "scaleswe-v1", dataset_name = "AweAI-Team/Scale-SWE", dataset_revision = "d8db20390a936bbda9c96d88b97cc4778dff1481", filter_unavailable_images = false, use_prime_registry = true }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe-a5"] } }
ttt = { base_url = "auto", qa = { meta_lessons = true } }

[[orchestrator.eval.env]]
name = "swebench-verified"
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe-a5"] } }
ttt = { base_url = "auto", qa = { meta_lessons = true } }
num_examples = 200
timeout = { rollout = 3600 }

[[orchestrator.eval.env]]
name = "swebench-pro"
taskset = { id = "swebench-pro-v1" }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe-a5"] } }
ttt = { base_url = "auto", qa = { meta_lessons = true } }
num_examples = 100
interval = 40
timeout = { rollout = 3600 }

[[orchestrator.eval.env]]
name = "deepdive"
taskset = { id = "deepdive-v1" }
harness = { id = "compacting", compact_at_tokens = 16384, search = true, forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-ttt-swe-a5"] } }
ttt = { base_url = "auto", qa = { meta_lessons = true } }
num_examples = 50
timeout = { rollout = 3600 }
