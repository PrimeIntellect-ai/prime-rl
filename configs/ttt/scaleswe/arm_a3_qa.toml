# A3 — compaction + QA-TTT: the adapter trains on model-authored Q&A items about each
# branch (train_rollout=false), generated with the branch in context; QA generations are
# ttt_qa branches, so RL also trains the memory-writing behavior. Read against A2.
# Compose with ttt_common.toml (shared [ttt] service overlay).

output_dir = "outputs/ttt-scaleswe/a3-qa"

[slurm]
job_name = "glm45air-ttt-swe-a3"

[wandb]
name = "a3-glm45air-scaleswe-ttt-qa"

[[orchestrator.train.env]]
name = "scaleswe"
taskset = { id = "scaleswe-v1", dataset_name = "AweAI-Team/Scale-SWE", dataset_revision = "d8db20390a936bbda9c96d88b97cc4778dff1481", filter_unavailable_images = false, use_prime_registry = true }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe-a3"] } }
ttt = { base_url = "auto", qa = {} }

[[orchestrator.eval.env]]
name = "swebench-verified"
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe-a3"] } }
ttt = { base_url = "auto", qa = {} }
num_examples = 200
timeout = { rollout = 3600 }

[[orchestrator.eval.env]]
name = "swebench-pro"
taskset = { id = "swebench-pro-v1" }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe-a3"] } }
ttt = { base_url = "auto", qa = {} }
num_examples = 100
interval = 40
timeout = { rollout = 3600 }

[[orchestrator.eval.env]]
name = "deepdive"
taskset = { id = "deepdive-v1" }
harness = { id = "compacting", compact_at_tokens = 16384, search = true, forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-ttt-swe-a3"] } }
ttt = { base_url = "auto", qa = {} }
num_examples = 50
timeout = { rollout = 3600 }
