# A3 — compaction + QA-TTT: the adapter trains on model-authored Q&A items about each
# branch (train_rollout=false), generated with the branch in context; QA generations are
# ttt_qa branches, so RL also trains the memory-writing behavior. Read against A2.

[wandb]
name = "a3-glm45air-scaleswe-ttt-qa"

[[orchestrator.train.env]]
name = "scaleswe"
taskset = { id = "scaleswe-v1" }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe"] } }
ttt = { base_url = "http://TTT_NODE:8092", qa = {} }

[[orchestrator.eval.env]]
name = "swebench-verified"
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe"] } }
ttt = { base_url = "http://TTT_NODE:8092", qa = {} }
timeout = { rollout = 3600 }
