# A4 — A3 + naive per-rollout recycling: each rollout's QA pairs additionally train the
# POLICY's main weights (ce component). Read against A3 (and head-to-head vs A5 — never
# combine recycle_to_policy with meta_lessons; effects must stay disentangled).
# Compose with ttt_common.toml (shared [ttt] service overlay).

output_dir = "outputs/ttt-scaleswe/a4-recycle"

[slurm]
job_name = "glm45air-ttt-swe-a4"

[wandb]
name = "a4-glm45air-scaleswe-ttt-qa-recycle"

[[orchestrator.train.env]]
name = "scaleswe"
taskset = { id = "scaleswe-v1", dataset_name = "AweAI-Team/Scale-SWE", dataset_revision = "d8db20390a936bbda9c96d88b97cc4778dff1481", filter_unavailable_images = false, use_prime_registry = true }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe-a4"] } }
ttt = { base_url = "auto", qa = { recycle_to_policy = true } }

[[orchestrator.eval.env]]
name = "swebench-verified"
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe-a4"] } }
ttt = { base_url = "auto", qa = { recycle_to_policy = true } }
num_examples = 200
timeout = { rollout = 3600 }

[[orchestrator.eval.env]]
name = "swebench-pro"
taskset = { id = "swebench-pro-v1" }
harness = { id = "compacting", compact_at_tokens = 16384, runtime = { type = "prime", labels = ["glm45air-ttt-swe-a4"] } }
ttt = { base_url = "auto", qa = { recycle_to_policy = true } }
num_examples = 100
interval = 40
timeout = { rollout = 3600 }

[[orchestrator.eval.env]]
name = "deepdive"
taskset = { id = "deepdive-v1" }
harness = { id = "compacting", compact_at_tokens = 16384, search = true, forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-ttt-swe-a4"] } }
ttt = { base_url = "auto", qa = { recycle_to_policy = true } }
num_examples = 50
timeout = { rollout = 3600 }
