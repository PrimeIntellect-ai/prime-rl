# A0 — pure RL anchor: plain harness, full 64k context, no compaction, no TTT.

output_dir = "outputs/ttt-scaleswe/a0-no-compaction"

[slurm]
job_name = "glm45air-ttt-swe-a0"

[wandb]
name = "a0-glm45air-scaleswe-64k"

[[orchestrator.train.env]]
name = "scaleswe"
taskset = { id = "scaleswe-v1", dataset_name = "AweAI-Team/Scale-SWE", dataset_revision = "d8db20390a936bbda9c96d88b97cc4778dff1481", filter_unavailable_images = false, use_prime_registry = true }
harness = { id = "default", runtime = { type = "prime", labels = ["glm45air-ttt-swe-a0"] } }

[[orchestrator.eval.env]]
name = "swebench-verified"
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "default", runtime = { type = "prime", labels = ["glm45air-ttt-swe-a0"] } }
num_examples = 200  # fixed subset: comparable across steps/arms, keeps 6-arm eval load sane
timeout = { rollout = 3600 }

# Within-domain generalization: a DIFFERENT SWE dataset (SWE-bench Pro, SWEAP images —
# no overlap with Scale-SWE). Same regime as training. Heavier tasks -> every 40 steps.
[[orchestrator.eval.env]]
name = "swebench-pro"
taskset = { id = "swebench-pro-v1" }
harness = { id = "default", runtime = { type = "prime", labels = ["glm45air-ttt-swe-a0"] } }
num_examples = 100
interval = 40
timeout = { rollout = 3600 }

# Out-of-domain: deepdive (long-horizon web research) — does the method transfer beyond
# SWE, and does compaction/TTT help where context pressure is highest? Needs
# SERPER_API_KEY (search tool, forwarded from the orchestrator env) and OPENAI_API_KEY
# (the taskset's gpt-5-mini judge) on the orchestrator node.
[[orchestrator.eval.env]]
name = "deepdive"
taskset = { id = "deepdive-v1" }
harness = { id = "default", search = true, forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["glm45air-ttt-swe-a0"] } }
num_examples = 50
timeout = { rollout = 3600 }
