max_steps = 500

[wandb]
project = "arc-1d-multistrategy"
name = "arc-1d-4b-lora"

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[orchestrator]
batch_size = 48
rollouts_per_example = 16

[orchestrator.sampling]
max_tokens = 12288
temperature = 1.0

[orchestrator.wandb.log_extras]
samples = true
interval = 1

[[orchestrator.env]]
id = "arc-1d-multistrategy"
name = "arc_1d_multistrategy"

[orchestrator.env.args]
num_examples = 200
sort_by_size = true

[ckpt]
interval = 10
keep_last = 3

[trainer.model]
seq_len = 16384
optimization_dtype = "bfloat16"

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-4

[trainer.model.lora]
rank = 32

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[inference]
enable_lora = true

[inference.model]
max_model_len = 16384
