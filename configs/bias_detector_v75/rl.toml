output_dir = "outputs/bias_detector_v75"
max_steps = 300
seq_len = 12288

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "self-play"
name = "bias-detector-v75-swa-extended"
offline = false

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[orchestrator]
batch_size = 24
rollouts_per_example = 4
use_verifier_step_advantages = true
use_token_client = false

[orchestrator.sampling]
max_tokens = 1024
temperature = 1.2

# V75: SWA-style Extended Training — V31's best config run for 300 steps with frequent checkpoints.
# V31 was STILL IMPROVING at step 149 and only 2.7% of steps had all criteria simultaneously good.
# Extended training + aggressive checkpointing (every 5 steps from step 100 onward)
# enables post-hoc per-criterion checkpoint selection.
# Hypothesis: with 40 additional checkpoints, we can find better criterion-coincidence windows.
[[orchestrator.env]]
id = "bias_detector"
name = "bias_detector"
args = { advantage_center = 0.3, gen_advantage_scale = 0.0, disc_advantage_scale = 2.0, disc_per_criterion_scales = [1.5, 2.0, 0.5], disc_num_examples = 5, disc_diverse_examples = true, disc_topic_hint = true, disc_mixed_prompt = true, disc_iterative = true, use_real_articles = true, use_corpus = true, real_oversample = 10, num_seed_rows = 1000 }

[orchestrator.val]
interval = 5
num_examples = 24

[orchestrator.model.lora]
name = "r8-1e-5"

[trainer.optim]
lr = 1e-5

[trainer.model.lora]
rank = 8

[trainer.ckpt.weights]
save_adapter_separately = true

[ckpt]
interval = 5

[inference]
enable_lora = true
gpu_memory_utilization = 0.7
