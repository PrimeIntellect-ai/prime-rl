seq_len = 2048

[log]
level = "debug"


[model]
name = "zai-org/GLM-4.5-Air"

[weight_broadcast]
type = "nccl"

[deployment]
type = "multi_node"
num_train_nodes = 2
num_infer_nodes = 2

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
optim_cpu_offload = true
ep = 8

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.model.ac]
freq = 1

[trainer.optim]
type = "muon"
lr = 1e-6

[orchestrator]
batch_size = 512
oversampling_factor = 4

[orchestrator.sampling]
max_tokens = 2048


[[orchestrator.env]]
id = "math-env"
name = "hendrycks-math"
args = { dataset_name = "PrimeIntellect/Hendrycks-Math", dataset_subset = "default", math_verify_max_workers = 128, math_verify_timeout = 60 }

[orchestrator.buffer]
easy_threshold = 1.0
hard_threshold = 0.0
seed = 42


[inference.parallel]
tp = 8
