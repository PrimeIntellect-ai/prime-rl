# Debug RL run on the v1 env server (reverse-text-v1 taskset).
# Single GPU: the rl entrypoint auto-launches the student inference server.
#   uv run rl @ configs/v1/training_mode/rl.toml

max_steps = 20
seq_len = 2048

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[wandb]
project = "reverse-text-v1-debug"
name = "debug-rl"

[orchestrator]
batch_size = 128
group_size = 16

[orchestrator.algo]
type = "grpo"

[orchestrator.renderer]
name = "qwen3"

[orchestrator.train.sampling]
max_completion_tokens = 128

[[orchestrator.train.env]]
taskset = { id = "reverse-text-v1" }
# Pure-text single-turn env: the model answers directly (no bash tool), subprocess runtime (no docker).
harness = { id = "default", runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 1
num_examples = 128

[orchestrator.eval.sampling]
max_completion_tokens = 128

[[orchestrator.eval.env]]
taskset = { id = "reverse-text-v1" }
harness = { id = "default", runtime = { type = "subprocess" } }

[trainer.optim]
lr = 3e-6

[ckpt]

[inference]
gpu_memory_utilization = 0.5
