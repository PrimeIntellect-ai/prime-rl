# Debug SFT (on-policy hard distillation) run on the v1 env server (reverse-text-v1).
# The teacher rolls out through the renderer client (token-in/out), so it must share the
# student's tokenizer; the student trains on the teacher's sampled tokens directly.
# Start the teacher inference server first (on a separate GPU):
#   CUDA_VISIBLE_DEVICES=1 uv run inference \
#     --model.name PrimeIntellect/Qwen3-0.6B-Reverse-Text-RL \
#     --server.port 8001 --gpu-memory-utilization 0.5 --model.enforce-eager
# Then:
#   uv run rl @ configs/v1/training_mode/sft.toml

max_steps = 20
seq_len = 2048

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[wandb]
project = "reverse-text-v1-debug"
name = "debug-sft"

[orchestrator]
training_mode = "sft"
batch_size = 128
group_size = 4

[orchestrator.renderer]
name = "qwen3"

[orchestrator.train.sampling]
max_completion_tokens = 128

[[orchestrator.train.env]]
taskset = { id = "reverse-text-v1" }
harness = { id = "default", runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 1
num_examples = 128

[orchestrator.eval.sampling]
max_completion_tokens = 128

[[orchestrator.eval.env]]
taskset = { id = "reverse-text-v1" }
harness = { id = "default", runtime = { type = "subprocess" } }

[orchestrator.teacher.model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-RL"

[orchestrator.teacher.client]
base_url = ["http://localhost:8001/v1"]

[trainer.optim]
lr = 3e-6

[ckpt]

[inference]
gpu_memory_utilization = 0.5
