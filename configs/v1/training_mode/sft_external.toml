# Debug SFT on the v1 env server (reverse-text-v1), distilling from openai/gpt-5-mini
# via PI inference. The external teacher returns no token ids (it's a hosted chat API),
# so the renderer backfills tokens into the student's (Qwen3) token space before training.
# Requires PRIME_API_KEY + PRIME_TEAM_ID in the environment. No local teacher needed.
#   uv run rl @ configs/v1/training_mode/sft_external.toml

max_steps = 20
seq_len = 2048

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[wandb]
project = "reverse-text-v1-debug"
name = "debug-sft-external"

[orchestrator]
training_mode = "sft"
batch_size = 128
group_size = 4

# The external teacher returns no tokens; the renderer backfills them into Qwen3 token space.
[orchestrator.renderer]
name = "qwen3"

[orchestrator.train.sampling]
max_completion_tokens = 2048
extra_body = { reasoning_effort = "minimal" }

[[orchestrator.train.env]]
taskset = { id = "reverse-text-v1" }
harness = { id = "default", enable_bash = false, runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 1
num_examples = 128

[orchestrator.eval.sampling]
max_completion_tokens = 128

[[orchestrator.eval.env]]
taskset = { id = "reverse-text-v1" }
harness = { id = "default", enable_bash = false, runtime = { type = "subprocess" } }

[orchestrator.teacher.model]
name = "openai/gpt-5-mini"

[orchestrator.teacher.client]
base_url = ["https://api.pinference.ai/api/v1"]
api_key_var = "PRIME_API_KEY"

[orchestrator.teacher.client.headers_from_env]
X-Prime-Team-ID = "PRIME_TEAM_ID"

[trainer.optim]
lr = 3e-6

[ckpt]

[inference]
gpu_memory_utilization = 0.5
