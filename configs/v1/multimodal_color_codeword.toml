# 2-GPU v1 RL run for the multimodal (renderer) path: Qwen3-VL-4B on the color-codeword-v1
# taskset. The v1 port of configs/debug/multimodal.toml — same model / sizing, but the env is
# the native v1 taskset (turn-0 images seeded in the Messages instruction; later turns injected
# by the colocated user simulator) rather than the v0 `color-codeword` env id.
#   uv run rl @ configs/v1/multimodal_color_codeword.toml

max_steps = 15
seq_len = 4096

[model]
name = "Qwen/Qwen3-VL-4B-Instruct"

[model.vlm]
vision_encoder_attr = "model.visual"
language_model_attr = "model.language_model"

[deployment]
num_train_gpus = 1
num_infer_gpus = 1
gpus_per_node = 2

[wandb]
project = "multimodal-color-codeword-debug"
name = "v1"

[orchestrator]
training_mode = "rl"
batch_size = 256
group_size = 16
# Image processor is CPU-bound and dominates for VLMs; returns diminish past 4.
pool_size = 4

# Step 0 on Qwen3-VL-4B vs color-codeword can be uniform (all-correct or all-wrong), so don't
# enforce zero-advantage dropping or training would crash before any progress.
[[orchestrator.post_batch_filters]]
type = "gibberish"

[[orchestrator.post_batch_filters]]
type = "repetition"

[[orchestrator.post_batch_filters]]
type = "zero_advantage"
enforce = false

# Renderer left as the default AutoRendererConfig: it resolves Qwen3-VL-4B-Instruct to the
# Qwen3VLRenderer via MODEL_RENDERER_MAP, so no explicit name is needed.

[orchestrator.train.sampling]
max_completion_tokens = 64

[[orchestrator.train.env]]
taskset = { id = "color-codeword-v1", images_per_turn = 1, max_turns = 3, num_examples = 1000, seed = 42 }
# Multi-turn VLM env: turn-0 squares ride in the task's Messages instruction, later turns come
# from the colocated user simulator. Subprocess runtime (no docker).
harness = { id = "default", enable_bash = false, runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 5
num_examples = 32

[orchestrator.eval.sampling]
max_completion_tokens = 64

[[orchestrator.eval.env]]
taskset = { id = "color-codeword-v1", images_per_turn = 1, max_turns = 3, num_examples = 1000, seed = 42 }
harness = { id = "default", enable_bash = false, runtime = { type = "subprocess" } }

[trainer]

[trainer.model]
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"

[trainer.optim]
lr = 3e-6

[ckpt]

[inference]

[inference.model]
# vLLM 0.20.1 Qwen3-VL deepstack buffer bug under cudagraph padding: eager mode keeps
# num_input_tokens == num_scheduled_tokens.
enforce_eager = true

[inference.parallel]
dp = 1
tp = 1
