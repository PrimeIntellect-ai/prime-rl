output_dir = "outputs/bias_detector_v55"
max_steps = 150
seq_len = 12288

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "self-play"
name = "bias-detector-v55-ultimate-v2"
offline = false

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[orchestrator]
batch_size = 24
rollouts_per_example = 4
use_verifier_step_advantages = true
use_token_client = false

[orchestrator.sampling]
max_tokens = 1024
temperature = 1.2

# V55: Ultimate V2 — informed by ALL findings from V25-V54.
# Combines every technique that showed positive signal:
# - Iterative correction with magnitude feedback (V31's winning feature + V51 improvement)
# - Causal structured prompt (V49's 3-step analysis)
# - Real-only data (no synthetic poison — V50's hypothesis)
# - Topic deconfounding (V46)
# - Hindsight explanation (V53's novel feature)
# - Quote masking (V28's 30% rate)
# But NOT confidence weighting (untested, could conflict with iterative)
# and NOT double iterative (might be too many turns with hindsight)
[[orchestrator.env]]
id = "bias_detector"
name = "bias_detector"
args = { advantage_center = 0.3, gen_advantage_scale = 0.0, disc_advantage_scale = 2.0, disc_per_criterion_scales = [2.0, 1.5, 0.5], disc_num_examples = 5, disc_diverse_examples = true, disc_topic_hint = true, disc_causal_prompt = true, disc_iterative = true, disc_magnitude_feedback = true, disc_hindsight_explain = true, disc_topic_deconfound = true, disc_mask_quotes = 0.3, use_real_articles = true, real_oversample = 20, num_seed_rows = 1000 }

[orchestrator.val]
interval = 10
num_examples = 24

[orchestrator.model.lora]
name = "r8-1e-5"

[trainer.optim]
lr = 1e-5

[trainer.model.lora]
rank = 8

[trainer.ckpt.weights]
save_adapter_separately = true

[ckpt]
interval = 25

[inference]
enable_lora = true
gpu_memory_utilization = 0.7
