max_steps = 5000
seq_len = 8192

[deployment]
num_train_gpus = 4
num_infer_gpus = 4

[wandb]
project = "hendrycks-sanity"
name = "hendrycks-sanity"

[ckpt]

[model]
name = "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"

[orchestrator]
batch_size = 512
group_size = 8

[[orchestrator.train.env]]
name = "hendrycks-math"
env.taskset = { id = "math-env-v1", dataset_name = "mikasenghaas/Sanity-Test-R1D-1.5B", dataset_subset = "default" }
env.agent.harness = { id = "null", runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 50

[[orchestrator.eval.env]]
name = "aime2024"
env.taskset = { id = "aime24-v1" }
env.agent.harness = { id = "null", runtime = { type = "subprocess" } }
group_size = 32

[trainer]

[trainer.model]
seq_len = 16384

[inference.parallel]
dp = 4

[inference.model]
max_model_len = 8192

[orchestrator.renderer]
name = "default"
reasoning_parser = "think"
