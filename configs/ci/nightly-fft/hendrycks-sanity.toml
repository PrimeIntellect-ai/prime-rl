max_steps = 200
seq_len = 8192

[deployment]
num_train_gpus = 2
num_infer_gpus = 6

[wandb]
project = "hendrycks-sanity"
name = "hendrycks-sanity"

[ckpt]

[model]
name = "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"

[orchestrator]
batch_size = 512
group_size = 16

[[orchestrator.train.env]]
name = "hendrycks-math"
env.taskset = { id = "math-env-v1", dataset_name = "mikasenghaas/Sanity-Test-R1D-1.5B", dataset_subset = "default" }
env.agent.harness = { id = "null", runtime = { type = "subprocess" } }

[orchestrator.train.sampling]
max_completion_tokens = 1024

[trainer]

[inference.parallel]
dp = 6

[inference.model]
max_model_len = 8192

[orchestrator.renderer]
name = "default"
reasoning_parser = "think"
