# Pin to a commit that carries the v1 env.taskset schema these configs
# use. The workflow no longer overrides this unless a dispatcher passes
# `image_tag=<tag>`. v0.7.0 predates cb74ae2be (`env.` wrapper) and
# rejects the config with `train.env[0].env — Extra inputs are not
# permitted`; drop this pin once v0.7.1+ ships.
image_tag = "commit-c505e07a1"

max_steps = 200
seq_len = 8192

[deployment]
num_train_gpus = 2
num_infer_gpus = 6

[wandb]
project = "wordle"
name = "wordle"

[ckpt]

[model]
name = "PrimeIntellect/Qwen3-1.7B-Wordle-SFT"

[orchestrator]
batch_size = 512
group_size = 16

[[orchestrator.train.env]]
name = "wordle"
env.taskset = { id = "wordle-v1" }
env.agent.harness = { id = "null", runtime = { type = "subprocess" } }

[orchestrator.train.sampling]
max_completion_tokens = 1024

[trainer]

[inference.parallel]
dp = 6

[orchestrator.renderer]
name = "prime-qwen3"
