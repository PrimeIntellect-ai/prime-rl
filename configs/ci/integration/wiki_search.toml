max_steps = 5
seq_len = 4096

[ckpt]

[model]
name = "PrimeIntellect/Qwen3-0.6B"

[trainer.optim]
lr = 1e-5

[orchestrator]
batch_size = 32
rollouts_per_example = 4

[orchestrator.train.sampling]
max_completion_tokens = 512

[[orchestrator.train.env]]
id = "wiki-search"

[orchestrator.renderer]
tool_parser = "qwen3"

[inference.model]
tool_call_parser = "hermes"
