# Smoke test for the RL-entrypoint SFT (on-policy hard distillation) algorithm.
# The policy inference deployment is launched by the rl entrypoint on GPU 0;
# the reference inference server is started externally by the test
# fixture (see tests/integration/test_reverse_text_rl_sft.py) on the same GPU.
# Trainer takes GPU 1. Training config mirrors `reverse_text/start.toml`.

max_steps = 5
seq_len = 2048

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[wandb]
project = "reverse-text-ci"
name = "ci-rl-sft"

[orchestrator]
actor = "reference"
batch_size = 128
group_size = 16

[[orchestrator.algorithms]]
id = "sft"

[orchestrator.renderer]
name = "qwen3"

[orchestrator.train.sampling]
max_completion_tokens = 128

[[orchestrator.train.env]]
id = "reverse-text"

[orchestrator.eval]
interval = 1
num_examples = 16

[orchestrator.eval.sampling]
max_completion_tokens = 128

[[orchestrator.eval.env]]
id = "reverse-text"

[orchestrator.models.reference]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-RL"
tokens = true

[orchestrator.models.reference.client]
base_url = ["http://localhost:8001/v1"]

[trainer.optim]
lr = 3e-6

[inference]
gpu_memory_utilization = 0.4
