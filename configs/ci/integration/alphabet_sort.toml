max_steps = 10
seq_len = 2048

[weight_broadcast]
# TEMP: NCCL weight broadcast currently crashes the trainer on CI GPU runners
# (trainer exits during NCCL init). Use filesystem transport until the NCCL
# path is fixed. See CI RL integration test failures on main.
type = "filesystem"

[ckpt]

[model]
name = "Qwen/Qwen3-0.6B"

[trainer.optim]
lr = 1e-5

[orchestrator]
batch_size = 128
group_size = 8

[orchestrator.train.sampling]
max_completion_tokens = 384

[[orchestrator.train.env]]
name = "alphabet-sort"
env.taskset = { id = "alphabet-sort-v1", min_turns = 2, max_turns = 2, min_names_per_turn = 1, max_names_per_turn = 3, task = { similarity_power = 4, power_per_turn = false } }
env.agent.harness = { id = "null" }
env.agent.runtime = { type = "subprocess" }

[inference]

# Mirror of Qwen/Qwen3-0.6B; PI's template patch always re-emits prior
# <think> blocks. Match that with renderer thinking_retention.
[orchestrator.renderer]
name = "auto"
thinking_retention = "all"
