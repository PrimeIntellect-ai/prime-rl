output_dir = "/beegfs/konstantin/nemotron-cp-test"
max_steps = 20
dist_timeout_seconds = 1800
loss_impl = "liger_fused"

[slurm]
job_name = "nemotron-cp-test"
partition = "cluster"
pre_run_command = "uv sync --all-extras --group mamba-ssm"

[deployment]
type = "multi_node"
num_nodes = 8
gpus_per_node = 8

[optim]
type = "adamw"
lr = 5e-5
weight_decay = 0.01

[scheduler]
type = "linear"
warmup = 2

[model]
name = "/beegfs/huggingface/hub/models--nvidia--NVIDIA-Nemotron-3-Super-120B-A12B-Base-BF16/snapshots/46cc6113d364942e7742b0b2afd35b5db5058b29"
impl = "custom"
attn = "flash_attention_2"
optim_cpu_offload = true
fused_lm_head_token_chunk_size = "disabled"
ep = 4
cp = 2

[tokenizer]
name = "/beegfs/huggingface/hub/models--nvidia--NVIDIA-Nemotron-3-Super-120B-A12B-Base-BF16/snapshots/46cc6113d364942e7742b0b2afd35b5db5058b29"
chat_template = "/beegfs/huggingface/hub/models--nvidia--NVIDIA-Nemotron-3-Super-120B-A12B-BF16/snapshots/7e74fe9a5a62b036155915a87dc28bff233f6206/chat_template.jinja"

[model.ac]
freq = 1

[model.ac_offloading]
max_inflight_activations = 5

[data]
type = "sft"
name = "PrimeIntellect/int5-mini-sft-combined"
subsets = ["am_chat", "openscience", "polaris", "r2e_gym"]
splits = ["train", "train", "train", "train"]
seq_len = 65536
batch_size = 64
seed = 42

[wandb]
project = "sft-nemotron"
name = "nemotron-cp-test"

[log]
level = "debug"
