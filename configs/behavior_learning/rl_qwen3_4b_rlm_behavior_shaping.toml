output_dir = "/beegfs/outputs/behavior-learning/qwen3-4b-rlm-behavior-shaping"
max_steps = 200
seq_len = 32768

[slurm]
job_name = "behavior-learning-qwen3-4b-rlm-behavior-shaping"
project_dir = "."
pre_run_command = "prime sandbox delete --label behavior-learning-behavior-shaping -y --plain; srun bash -c 'pkill -9 -f torchrun; pkill -9 -f vllm; true'"

[deployment]
num_train_gpus = 4
num_infer_gpus = 4

[log]
level = "debug"

[wandb]
project = "behavior-learning"
name = "qwen3-4b-rlm-behavior-shaping"

[weight_broadcast]
type = "nccl"

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "Qwen/Qwen3-4B-Thinking-2507"

# --- Trainer ---

[trainer]

[trainer.model.ac]
freq = 1

[trainer.model.compile]

# --- Orchestrator ---

[orchestrator]
batch_size = 256
rollouts_per_example = 8
max_off_policy_steps = 32

[[orchestrator.train.env]]
id = "general-agent-solver-rlm"
num_workers = 4
max_retries = 1

[orchestrator.train.env.args]
rlm_ref = "62b3f25f2ad27e760ab60ccff0f385b9de2d04ff"
behavior_judge_model = "openai/gpt-5-mini"
behavior_reward_alpha = 1.0
labels = ["behavior-learning-behavior-shaping"]

[orchestrator.prime_monitor]

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85

[inference.model]
max_model_len = 32768
tool_call_parser = "hermes"

[inference.parallel]
dp = 4
