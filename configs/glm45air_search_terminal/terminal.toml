# exp: GLM-4.5-Air (100B MoE) RL across our v1 TERMINAL-domain envs — agentic shell/sandbox tasks
# run through the rlm harness (ipython-only) on a prime sandbox. Each task ships its own Docker image
# (NEEDS_CONTAINER) injected into the sandbox; grading is host-side inside the container. GRPO +
# linear length penalty. 2 train + 4 infer nodes. Single run label (glm45air-terminal) for all envs.
#
# Train = the terminal training sets (terminal-bench-lite + a synthetic forensic-CTF). Eval = the
# fixed sandbox benchmarks, with terminal-bench-2 the primary terminal target (the SWE-Bench evals
# are kept as cross-domain reference points).
#
# NOTE: this is the TERMINAL domain — the SWE tasksets (scaleswe-v1, r2e-gym-v1) are a separate SWE
# domain and are intentionally NOT trained here. terminal-bench-2-v1 rlm compatibility is inferred
# from its Harbor base (harness-opaque reward), not config-proven — smoke-test it.
#
# Mirrors configs/debug/v1/glm45air_scaleswe.toml (model/trainer/parallelism/caches): glm4_moe
# router replay, glm-4.5 renderer, cp=8 ulysses, muon, LM-head chunking, AC + activation/optimizer
# offload, skip-gather/optimizer ckpt.

max_steps = 1000
seq_len = 65536

# Redirect compile/JIT caches to node-local /tmp (per user + job) to avoid contended shared-FS caches.
[env_vars]
TRITON_CACHE_DIR = "/tmp/triton-cache-$USER-$SLURM_JOB_ID"

[slurm]
job_name = "glm45air-terminal"
project_dir = "."
partition = "all"
# Clean up this run's orphaned prime sandboxes before launch (label == SLURM job name == run label).
pre_run_command = 'timeout 120 prime sandbox delete --label "$SLURM_JOB_NAME" -y || true'

[deployment]
type = "multi_node"
num_train_nodes = 2
num_infer_nodes = 1
num_infer_replicas = 4

[wandb]
project = "search-terminal-ablations"
name = "glm45air-terminal"

[weight_broadcast]
type = "nccl"
timeout = 3600

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "zai-org/GLM-4.5-Air"

# --- Trainer ---

[trainer]
dist_timeout_seconds = 3600
enable_router_replay = true

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
cp = 8
cp_style = "ulysses"
fused_lm_head_token_chunk_size = 1024
optim_cpu_offload = true

[trainer.model.ac]

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.model.compile]

[trainer.ckpt]
skip_gather_master_weights = true
skip_optimizer = true

[trainer.optim]
type = "muon"

# --- Orchestrator ---

[orchestrator]
batch_size = 256
group_size = 16
max_off_policy_steps = 32
max_inflight_rollouts = 512

[orchestrator.renderer]
name = "glm-4.5"
thinking_retention = "all"

# GRPO + linear length penalty (pass-rate-scaled output/input-token + turns terms; default weights).
[orchestrator.algo]
type = "grpo"

[orchestrator.algo.length_penalty]
type = "linear"

[orchestrator.prime_monitor]

# --- Train: terminal training sets (per-task Docker image in a prime sandbox, rlm ipython) ---

[[orchestrator.train.env]]
name = "openthoughts-tblite"
taskset = { id = "openthoughts-tblite-v1" } # terminal-bench-lite training corpus (Harbor; per-task images)
harness = { id = "rlm", runtime = { type = "prime", labels = ["glm45air-terminal"] } }

[[orchestrator.train.env]]
name = "uuid-ctf"
taskset = { id = "uuid-ctf-v1" } # synthetic forensic-CTF; `difficulty` defaults to easy
harness = { id = "rlm", runtime = { type = "prime", labels = ["glm45air-terminal"] } }

# --- Eval: fixed sandbox benchmarks every 20 steps (incl. step 0); terminal-bench-2 is primary ---

[orchestrator.eval]
interval = 20
skip_first_step = false

[[orchestrator.eval.env]]
name = "terminal-bench-2"
taskset = { id = "terminal-bench-2-v1" }
harness = { id = "rlm", runtime = { type = "prime", labels = ["glm45air-terminal"] } }
num_examples = 100
group_size = 1
timeout = { rollout = 3600 }

[[orchestrator.eval.env]]
name = "swebench-verified"
# Ships Dockerfiles, not pullable images → resolve via the prime-mirrored registry.
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "rlm", runtime = { type = "prime", labels = ["glm45air-terminal"] } }
num_examples = 100
group_size = 1
timeout = { rollout = 3600 }

[[orchestrator.eval.env]]
name = "swebench-pro"
taskset = { id = "swebench-pro-v1" } # public Docker Hub images, no prime mirror needed
harness = { id = "rlm", runtime = { type = "prime", labels = ["glm45air-terminal"] } }
num_examples = 100
group_size = 1
timeout = { rollout = 3600 }

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85
enable_prefix_caching = true
enable_return_routed_experts = true

# vLLM + FlashInfer caches on node-local /tmp.
[inference.env_vars]
VLLM_CACHE_ROOT = "/tmp/.vllm_cache_$(whoami)"
FLASHINFER_WORKSPACE_BASE = "/tmp/flashinfer-$(whoami)"

[inference.model]
max_model_len = 65536

[inference.parallel]
tp = 8
