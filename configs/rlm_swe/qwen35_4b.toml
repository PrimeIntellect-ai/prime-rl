output_dir = "/beegfs/mika/rlm-swe-qwen35-4b"
max_steps = 100
seq_len = 65536

[slurm]
job_name = "rlm-swe-qwen35-4b"
project_dir = "."
pre_run_command = "prime sandbox delete --label rlm-swe-qwen35-4b -y --plain || true"

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 1

[wandb]
project = "rlm-swe-debug"
name = "qwen35-4b"

[weight_broadcast]
type = "nccl"

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "Qwen/Qwen3.5-4B"

# --- Trainer ---

[trainer]

[trainer.model]
cp = 4
cp_style = "ulysses"

[trainer.model.ac]
freq = 1

[trainer.model.compile]

# --- Orchestrator ---

[orchestrator]
batch_size = 256
group_size = 8
max_inflight_rollouts = 512
max_off_policy_steps = 16

[orchestrator.train.sampling]
temperature = 1.0

[[orchestrator.train.env]]
id = "rlm_swe"
name = "rlm-swe-r2e"
num_workers = 4

[orchestrator.train.env.args]
labels = ["rlm-swe-qwen35-4b"]

[orchestrator.prime_monitor]

[orchestrator.eval]
interval = 20

[[orchestrator.eval.env]]
id = "rlm_swe"
name = "rlm-swe-swebench-verified-quick"
num_workers = 4
timeout = 3600

[orchestrator.eval.env.args]
task_type = "swebench"
dataset_name = "PrimeIntellect/SWE-Bench-Verified-Quick"
labels = ["rlm-swe-qwen35-4b"]

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85

[inference.model]
max_model_len = 65536

[inference.parallel]
dp = 8
